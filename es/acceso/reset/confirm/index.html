<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Confirmar nueva contraseña · Onion Support</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🚫 NO INDEXAR -->
  <meta name="robots" content="noindex, nofollow">

  <!-- Canonical -->
  <link rel="canonical" href="https://onionsupport.com/es/reset/confirm/" />

  <!-- FAVICON -->
  <link rel="icon"
        type="image/png"
        href="/media/img/favicon_support.png">

  <!-- CSS -->
  <link rel="stylesheet" href="/css/nav/acceso.css">
  <link rel="stylesheet" href="/css/acceso/password/password.css">
</head>

<body>

<a href="/es/acceso/" class="back-arrow" aria-label="Volver al acceso"></a>

<div class="login-card">

  <div class="login-header">
    <img
      src="/media/img/Favicon/favicon_support.ico"
      alt="Onion Support"
      width="48"
      height="48">
    <h2>Restablecer contraseña</h2>
    <p>Introduce tu nueva contraseña</p>
  </div>

  <form id="confirmForm" novalidate>

    <!-- MENSAJES -->
    <div class="login-error" style="display:none;"></div>
    <div class="login-success" style="display:none;"></div>

    <!-- PASSWORD 1 -->
    <div class="login-field">

      <label for="password">Nueva contraseña</label>

      <div class="password-wrapper">
        <input type="password"
               id="password"
               name="password"
               autocomplete="new-password"
               required>

        <button type="button"
                class="password-toggle"
                data-target="password"
                aria-label="Mostrar contraseña"
                aria-pressed="false">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor"
              d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7Zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8Z"/>
          </svg>
        </button>
      </div>

      <div class="caps-warning"
           data-caps="password"
           aria-live="polite">
        Bloq Mayús activado
      </div>

    </div>

    <!-- PASSWORD 2 -->
    <div class="login-field">

      <label for="password2">Repetir contraseña</label>

      <div class="password-wrapper">
        <input type="password"
               id="password2"
               name="password2"
               autocomplete="new-password"
               required>

        <button type="button"
                class="password-toggle"
                data-target="password2"
                aria-label="Mostrar contraseña"
                aria-pressed="false">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor"
              d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7Zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8Z"/>
          </svg>
        </button>
      </div>

      <div class="caps-warning"
           data-caps="password2"
           aria-live="polite">
        Bloq Mayús activado
      </div>

    </div>

    <button class="login-button" type="submit">
      Guardar contraseña
    </button>

  </form>

  <div class="login-footer">
    © 2026 Onion Support
  </div>

</div>

<!-- TOAST (por si lo usas en otros scripts) -->
<div id="toastContainer" class="toast-container"></div>

<script src="/js/acceso/reset/confirm-reset.js"></script>

</body>
</html>
