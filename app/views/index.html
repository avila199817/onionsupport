<div class="panel-content dashboard pro-saas">

  <!-- 🔥 LOADER -->
  <div class="dashboard-loading">
    <div class="dashboard-spinner"></div>
  </div>

  <div class="dashboard-container">

    <!-- =========================
         HEADER
    ========================= -->
    <div class="dashboard-header">

      <div class="dashboard-title">
        <h1>Dashboard</h1>
        <span>Control financiero</span>
      </div>

      <div class="dashboard-live">
        <span class="dot"></span>
        En vivo
      </div>

    </div>

    <!-- =========================
         HERO (🔥 FOCO TOTAL)
    ========================= -->
    <div class="dashboard-hero">

      <span class="hero-label">Facturación hoy</span>

      <strong id="home-facturacion-mes" class="hero-value">
        €0
      </strong>

    </div>

    <!-- =========================
         STATUS STRIP
    ========================= -->
    <div class="dashboard-strip">

      <div class="strip-item">
        API <strong id="status-api">-- ms</strong>
      </div>

      <div class="strip-item">
        DB <strong id="status-db">--</strong>
      </div>

      <div class="strip-item">
        Uptime <strong id="status-uptime">--</strong>
      </div>

      <div class="strip-item">
        CPU <strong id="cpu-usage">--%</strong>
      </div>

      <div class="strip-item">
        RAM <strong id="ram-usage">--%</strong>
      </div>

      <div class="strip-item">
        Disco <strong id="disk-usage">--%</strong>
      </div>

    </div>

    <!-- =========================
         FACTURACIÓN ANUAL (🔥 CLAVE)
    ========================= -->
    <div class="year-revenue">

      <div class="year-header">
        <h2>Facturación 2026</h2>
      </div>

      <div class="year-grid">

        <div class="month"><span>Ene</span><strong>€0</strong></div>
        <div class="month"><span>Feb</span><strong>€0</strong></div>
        <div class="month"><span>Mar</span><strong>€0</strong></div>
        <div class="month"><span>Abr</span><strong>€0</strong></div>
        <div class="month"><span>May</span><strong>€0</strong></div>
        <div class="month"><span>Jun</span><strong>€0</strong></div>
        <div class="month"><span>Jul</span><strong>€0</strong></div>
        <div class="month"><span>Ago</span><strong>€0</strong></div>
        <div class="month"><span>Sep</span><strong>€0</strong></div>
        <div class="month"><span>Oct</span><strong>€0</strong></div>
        <div class="month"><span>Nov</span><strong>€0</strong></div>
        <div class="month"><span>Dic</span><strong>€0</strong></div>

      </div>

    </div>

    <!-- =========================
         ACTIVIDAD
    ========================= -->
    <div class="dashboard-activity">

      <div class="activity-header">
        Actividad reciente
      </div>

      <div id="activity-list" class="activity-list">

        <div class="activity-item">
          <div class="activity-title">Cargando actividad...</div>
          <div class="activity-meta">Esperando datos</div>
        </div>

      </div>

    </div>

  </div>

</div>
