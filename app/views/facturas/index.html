<div class="panel-content facturas table-mode">

  <!-- =========================
       HEADER / KPIs (OPCIONAL PRO)
  ========================= -->
  <div class="facturas-header">

    <div class="facturas-kpis">
      <div class="kpi">
        <span class="kpi-label">Total cobrado</span>
        <span id="facturas-total" class="kpi-value">0,00 €</span>
      </div>

      <div class="kpi">
        <span class="kpi-label">Pagadas</span>
        <span id="facturas-pagadas" class="kpi-value">0</span>
      </div>

      <div class="kpi">
        <span class="kpi-label">Pendientes</span>
        <span id="facturas-pendientes" class="kpi-value">0</span>
      </div>
    </div>

  </div>


  <!-- 🔥 TABLE SYSTEM -->
  <div class="table-system facturas">

    <!-- =========================
         FILTROS
    ========================= -->
    <div class="filters-row">

      <input 
        type="text"
        id="search-factura"
        placeholder="Buscar por cliente o ID..."
        autocomplete="off"
      >

      <select id="filter-estado-factura">
        <option value="">Estado</option>
        <option value="pagada">Pagada</option>
        <option value="pendiente">Pendiente</option>
      </select>

      <button id="btn-new-factura" class="btn-new-factura">
        + Nueva
      </button>

    </div>


    <!-- =========================
         TABLA
    ========================= -->
    <div class="table-container">

      <table aria-label="Listado de facturas">

        <thead>
          <tr>
            <th class="col-id">ID</th>
            <th class="col-main">Cliente</th>
            <th class="col-date">Fecha</th>
            <th class="col-importe">Importe</th>
            <th class="col-status">Estado</th>
            <th class="col-actions">Acciones</th>
          </tr>
        </thead>

        <tbody id="facturas-body">

          <!-- =========================
               LOADING STATE
          ========================= -->
          <tr class="loading">
            <td colspan="6">Cargando facturas...</td>
          </tr>

          <!-- =========================
               EMPTY STATE (JS LO USA)
          ========================= -->
          <!--

          </tr>
