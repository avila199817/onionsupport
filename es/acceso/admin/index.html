html, body {

}

body.loading {

#app-loader {
  position: fixed;
  inset: 0;
  background: #ffffff;

  display: flex;
  align-items: center;
  justify-content: center;

  z-index: 999999;

  transition: opacity .35s ease, visibility .35s ease;
}

.loader-logo {
  width: 64px;
  height: 64px;
  animation: pulse 1.2s ease-in-out infinite;
}

@keyframes pulse {
  0%   { opacity: 0.4; transform: scale(.92); }
  50%  { opacity: 1;   transform: scale(1); }
  100% { opacity: 0.4; transform: scale(.92); }
}

#app-loader.hide {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

<!-- CORE JS -->
<script src="/js/acceso/admin/core.js" defer></script>


<script>
(function(){

"use strict";

/* =========================
   INIT GUARD
========================= */

if(window.__sidebarInit) return;
window.__sidebarInit = true;


/* =========================
   RENDER SIDEBAR (GLOBAL)
========================= */

window.renderSidebar = function(){

  const Onion = window.Onion;
  const user = Onion?.state?.user;

  if(!user) return;

  const nameEl = document.getElementById("sidebar-name");
  const avatarEl = document.getElementById("sidebar-avatar");

  if(!nameEl || !avatarEl) return;

  /* =========================
     NAME
  ========================= */

  const name =
    user.name ||
    user.username ||
    user.email ||
    "Usuario";

  nameEl.textContent = name;

  /* =========================
     AVATAR
  ========================= */

  avatarEl.innerHTML = "";

  if(user.avatar){

    const img = document.createElement("img");
    img.src = user.avatar;
    img.alt = "avatar";

    img.style.width = "100%";
    img.style.height = "100%";
    img.style.borderRadius = "50%";
    img.style.objectFit = "cover";

    avatarEl.appendChild(img);

  }else{

    const initials = name
      .split(" ")
      .map(n => n[0])
      .join("")
      .substring(0,2)
      .toUpperCase();

    avatarEl.textContent = initials;

  }

  console.log("✅ SIDEBAR OK");
};


/* =========================
   ACTIVE LINK
========================= */

window.updateSidebarActive = function(){

  const links = document.querySelectorAll(".sidebar a[data-link]");
  const route = window.Onion?.router?.get?.();

  links.forEach(a => {
    const href = a.getAttribute("href");

    if(href === route){
      a.classList.add("active");
    }else{
      a.classList.remove("active");
    }
  });

};


/* =========================
   DOM READY
========================= */

document.addEventListener("DOMContentLoaded", () => {

  const userToggle = document.getElementById("userToggle");
  const dropdown = document.getElementById("userDropdown");
  const logoutBtn = document.getElementById("logoutBtn");

  const toggleSidebar = document.getElementById("toggleSidebar");
  const sidebar = document.querySelector(".sidebar");

  const menuItems = document.querySelectorAll(".menu-item");

  
  /* =========================
     TOOLTIP TOGGLE BUTTON
  ========================= */

  const updateToggleTooltip = () => {
    if(!toggleSidebar || !sidebar) return;

    const isCollapsed = sidebar.classList.contains("collapsed");

    toggleSidebar.setAttribute(
      "data-tooltip",
      isCollapsed ? "Abrir barra lateral" : "Cerrar barra lateral"
    );
  };


  /* =========================
     TOOLTIP MENU AUTO
  ========================= */

  const initMenuTooltips = () => {
    menuItems.forEach(item => {
      const textEl = item.querySelector("span:last-child");

      if(textEl){
        const text = textEl.textContent.trim();
        item.setAttribute("data-tooltip", text);
      }
    });
  };


  /* =========================
     SIDEBAR INIT STATE
  ========================= */

  if(sidebar){
    const saved = localStorage.getItem("sidebar-collapsed");

    if(saved === "true"){
      sidebar.classList.add("collapsed");
    }
  }

  updateToggleTooltip();
  initMenuTooltips();


/* =========================
   SIDEBAR TOGGLE
========================= */

if(toggleSidebar && sidebar){

  toggleSidebar.addEventListener("click", ()=>{

    const isCollapsed = sidebar.classList.contains("collapsed");

    // cerrar dropdown si está abierto
    if(dropdown){
      dropdown.classList.remove("active");
    }

    // toggle limpio
    sidebar.classList.toggle("collapsed");

    // guardar estado
    localStorage.setItem("sidebar-collapsed", !isCollapsed);

    // actualizar tooltip
    updateToggleTooltip();

  });

}


  /* =========================
     DROPDOWN + AVATAR
  ========================= */

  if(userToggle && dropdown && sidebar){

    userToggle.addEventListener("click", (e)=>{
      e.stopPropagation();

      const isCollapsed = sidebar.classList.contains("collapsed");

      if(isCollapsed){
        sidebar.classList.remove("collapsed");
        localStorage.setItem("sidebar-collapsed", false);
        updateToggleTooltip();

        setTimeout(()=>{
          dropdown.classList.add("active");
        }, 180);

        return;
      }

      dropdown.classList.toggle("active");
    });

    dropdown.addEventListener("click", (e)=>{
      e.stopPropagation();
    });

    document.addEventListener("click", ()=>{
      dropdown.classList.remove("active");
    });

  }


  /* =========================
     LOGOUT
  ========================= */

  if(logoutBtn){
    logoutBtn.addEventListener("click", async (e)=>{
      e.preventDefault();

      try{
        localStorage.removeItem("onion_token");
        sessionStorage.clear();

        document.cookie.split(";").forEach(c => {
          document.cookie = c
            .replace(/^ +/, "")
            .replace(/=.*/, "=;expires=" + new Date(0).toUTCString() + ";path=/");
        });

        try{
          await fetch("/api/logout", {
            method: "POST",
            credentials: "include"
          });
        }catch(err){}

      } finally {
        window.location.replace("/login");
      }

    });
  }

});


/* =========================
   LOADER FALLBACK
========================= */

setTimeout(() => {

  const loader = document.getElementById("app-loader");

  if(loader){
    loader.classList.add("hide");
    setTimeout(()=> loader.remove(), 350);
  }

  document.body.classList.remove("loading");

}, 4000);

})();
</script>
