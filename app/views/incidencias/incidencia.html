<div class="panel-content incidencia-create user-mode">

  <!-- =========================
       WRAPPER CENTRADO
  ========================= -->
  <div class="form-center">

    <!-- HEADER -->
    <div class="form-header">

      <button id="btn-back" class="btn-back">
        ← Volver
      </button>

      <div class="form-title">
        <h2>Nueva incidencia</h2>
        <p>Cuéntanos qué problema estás teniendo</p>
      </div>

    </div>

    <!-- FORM CARD -->
    <div class="form-card">

      <div class="form-grid">

        <!-- TÍTULO -->
        <div class="form-group">
          <label>Título</label>
          <input 
            type="text"
            id="inc-title"
            placeholder="Ej: No puedo acceder a mi cuenta"
          >
        </div>

        <!-- MENSAJE -->
        <div class="form-group">
          <label>Descripción</label>
          <textarea 
            id="inc-message"
            placeholder="Explícanos el problema con detalle..."
            rows="6"
          ></textarea>
        </div>

        <!-- USUARIO -->
        <div class="form-group">
          <label>Usuario</label>
          <input 
            type="text"
            id="inc-cliente"
            placeholder="Tu nombre o usuario"
          >
        </div>

        <!-- PRIORIDAD -->
        <div class="form-group">
          <label>Prioridad</label>
          <select id="inc-priority">
            <option value="low">Baja (no urgente)</option>
            <option value="medium">Media</option>
            <option value="high">Alta (urgente)</option>
          </select>
        </div>

        <!-- CTA -->
        <div class="form-actions">
          <button id="btn-save-incidencia" class="btn-primary">
            Enviar incidencia
          </button>
        </div>

      </div>

    </div>

  </div>

</div>
