<div class="panel-content incidencia-create">

  <div class="layout-split">

    <!-- =========================
         LEFT (FORM)
    ========================= -->
    <div class="incidencia-left">

      <!-- HEADER -->
      <div class="filters-row">

        <!-- BLOQUE IZQUIERDO -->
        <div class="header-left">
          <div class="page-title">
            Hola, Usuario 👋
          </div>
          <div class="page-subtitle">
            ¿En qué te podemos ayudar?
          </div>
        </div>

        <!-- BOTÓN DERECHA -->
        <button id="btn-back">
          ← Volver
        </button>

      </div>


      <!-- BODY -->
      <div class="incidencia-body">

        <div class="incidencia-form">

          <!-- ASUNTO -->
          <input 
            type="text"
            id="inc-title"
            placeholder="Asunto — Ej: No puedo acceder a mi cuenta"
            autocomplete="off"
          >

          <!-- MENSAJE -->
          <textarea 
            id="inc-message"
            placeholder="Cuéntanos qué está pasando..."
            rows="8"
          ></textarea>

          <!-- ADJUNTOS -->
          <div class="incidencia-files">

            <button type="button" id="btn-attach">
              + Añadir archivos
            </button>

            <input 
              type="file"
              id="inc-files"
              multiple
              hidden
            >

            <div id="file-list"></div>

          </div>

          <!-- FOOTER -->
          <div class="incidencia-footer">

            <div class="incidencia-hint">
              Puedes añadir capturas, PDFs o lo que necesites
            </div>

            <button id="btn-save-incidencia">
              Enviar incidencia
            </button>

          </div>

        </div>

      </div>

    </div>


    <!-- =========================
         RIGHT (HISTÓRICO USER)
    ========================= -->
    <aside class="incidencia-right">

      <div class="incidencia-history">

        <div class="history-header">
          Tus incidencias abiertas
        </div>

        <div id="incidencias-user-list" class="history-list">
          Cargando...
        </div>

      </div>

    </aside>

  </div>

</div>
