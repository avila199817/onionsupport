<div class="panel-content incidencias">

  <div class="container">

    <!-- HEADER -->
    <div class="dashboard-header"></div>

    <!-- =========================
         GRID PRINCIPAL
    ========================= -->
    <div class="dashboard-grid">

      <div class="panel-block table-block">

        <!-- 🔥 TABLE SYSTEM WRAPPER -->
        <div class="table-system incidencias">

          <!-- =========================
               FILTROS
          ========================= -->
          <div class="filters-row">

            <input 
              type="text"
              id="search-incidencia"
              placeholder="Buscar incidencia..."
              autocomplete="off"
            >

            <select id="filter-status">
              <option value="">Estado</option>
              <option value="abierta">Abierta</option>
              <option value="progreso">En progreso</option>
              <option value="cerrada">Cerrada</option>
            </select>

            <select id="filter-priority">
              <option value="">Prioridad</option>
              <option value="alta">Alta</option>
              <option value="media">Media</option>
              <option value="baja">Baja</option>
            </select>

            <button type="button" id="btn-new" class="btn-new-incidencia">
              + Nuevo
            </button>

          </div>

          <!-- =========================
               TABLA
          ========================= -->
          <div class="table-container">

            <table>

              <thead>
                <tr>
                  <th class="col-id">ID<div class="resizer"></div></th>
                  <th class="col-main">Asunto<div class="resizer"></div></th>
                  <th class="col-secondary">Cliente<div class="resizer"></div></th>
                  <th class="col-secondary">Técnico<div class="resizer"></div></th>
                  <th class="col-status">Estado<div class="resizer"></div></th>
                  <th class="col-status">Prioridad<div class="resizer"></div></th>
                  <th class="col-date">Fecha<div class="resizer"></div></th>
                  <th class="col-date">Fecha cierre<div class="resizer"></div></th>
                </tr>
              </thead>

              <tbody id="incidencias-body">
                <tr class="loading">
                  <td colspan="8">Cargando incidencias...</td>
                </tr>
              </tbody>

            </table>

          </div>

        </div> <!-- END table-system -->

      </div>

    </div>

  </div>

</div>
