<div class="panel-content usuarios">

  <div class="container">

    <!-- HEADER VACÍO (ESPACIADO COMO HOME) -->
    <div class="dashboard-header"></div>

    <!-- =========================
         GRID PRINCIPAL
    ========================= -->
    <div class="dashboard-grid">

      <div class="panel-block table-block">

        <div class="section-title">Listado de usuarios</div>

        <!-- FILTROS -->
        <div class="filters-row" style="margin-bottom:16px;">

          <input 
            type="text"
            id="search-usuario"
            placeholder="Buscar usuario..."
            autocomplete="off"
          >

          <select id="filter-estado-usuario">
            <option value="">Estado</option>
            <option value="activo">Activo</option>
            <option value="inactivo">Inactivo</option>
          </select>

        </div>

        <!-- TABLA -->
        <div class="table-container">

          <table class="usuarios-table">

            <thead>
              <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Rol</th>
                <th>Estado</th>
                <th>Fecha</th>
                <th>Acciones</th>
              </tr>
            </thead>

            <tbody id="usuarios-body">
              <tr class="table-loading">
                <td colspan="7">Cargando usuarios...</td>
              </tr>
            </tbody>

          </table>

        </div>

      </div>

    </div>

  </div>

</div>
