<div class="panel-content incidencias">

  <div class="container-fluid">

    <!-- =========================
         GRID PRINCIPAL
    ========================= -->
    <div class="dashboard-grid">

      <div class="panel-block table-block">

        <!-- =========================
             TABLE SYSTEM
        ========================= -->
        <div class="table-system incidencias">

          <!-- =========================
               FILTROS
          ========================= -->
          <div class="filters-row">

            <!-- SEARCH -->
            <div class="filter-group">
              <label for="search-incidencia" class="sr-only">Buscar incidencia</label>
              <input 
                type="text"
                id="search-incidencia"
                placeholder="Buscar incidencia..."
                autocomplete="off"
              >
            </div>

            <!-- STATUS -->
            <div class="filter-group">
              <label for="filter-status" class="sr-only">Estado</label>
              <select id="filter-status">
                <option value="">Estado</option>
                <option value="abierta">Abierta</option>
                <option value="progreso">En progreso</option>
                <option value="cerrada">Cerrada</option>
              </select>
            </div>

            <!-- PRIORITY -->
            <div class="filter-group">
              <label for="filter-priority" class="sr-only">Prioridad</label>
              <select id="filter-priority">
                <option value="">Prioridad</option>
                <option value="alta">Alta</option>
                <option value="media">Media</option>
                <option value="baja">Baja</option>
              </select>
            </div>

            <!-- ACTION -->
            <div class="filter-actions">
              <button 
                type="button" 
                id="btn-new" 
                class="btn-new-incidencia interactive"
              >
                + Nueva incidencia
              </button>
            </div>

          </div>


          <!-- =========================
               TABLA
          ========================= -->
          <div class="table-container">

            <table>

              <thead>
                <tr>
                  <th class="col-id">ID<div class="resizer"></div></th>
                  <th class="col-main">Asunto<div class="resizer"></div></th>
                  <th class="col-secondary">Cliente<div class="resizer"></div></th>
                  <th class="col-secondary">Técnico<div class="resizer"></div></th>
                  <th class="col-status">Estado<div class="resizer"></div></th>
                  <th class="col-status">Prioridad<div class="resizer"></div></th>
                  <th class="col-date">Fecha<div class="resizer"></div></th>
                  <th class="col-date">Cierre<div class="resizer"></div></th>
                </tr>
              </thead>

              <tbody id="incidencias-body">

                <!-- LOADING -->
                <tr class="loading">
                  <td colspan="8">
                    <span class="loading-text">Cargando incidencias...</span>
                  </td>
                </tr>

              </tbody>

            </table>

          </div>

        </div>
        <!-- END table-system -->

      </div>

    </div>

  </div>

</div>
