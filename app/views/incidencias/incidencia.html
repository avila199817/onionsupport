<div class="panel-content incidencia-create">

  <div class="container">

    <div class="panel-block">

      <!-- HEADER -->
      <div class="filters-row">
        <button id="btn-back">← Volver</button>
        <h3 style="margin-left:10px;">Nueva incidencia</h3>
      </div>

      <!-- FORM -->
      <div style="padding:20px; max-width:700px;">

        <div style="display:flex; flex-direction:column; gap:16px;">

          <input type="text" id="inc-title" placeholder="Título de la incidencia">

          <textarea id="inc-message" placeholder="Describe el problema..." rows="5"></textarea>

          <input type="text" id="inc-cliente" placeholder="Cliente">

          <select id="inc-priority">
            <option value="low">Prioridad baja</option>
            <option value="medium">Prioridad media</option>
            <option value="high">Prioridad alta</option>
          </select>

          <button id="btn-save-incidencia">
            Crear incidencia
          </button>

        </div>

      </div>

    </div>

  </div>

</div>
