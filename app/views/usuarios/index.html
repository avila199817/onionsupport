<div class="panel-content usuarios">

  <div class="container">

    <div class="panel-block">

      <!-- =========================
           FILTROS
      ========================= -->
      <div class="filters-row">

        <input 
          type="text"
          id="search-usuario"
          placeholder="Buscar usuario..."
          autocomplete="off"
        >

        <select id="filter-estado-usuario">
          <option value="">Estado</option>
          <option value="activo">Activo</option>
          <option value="inactivo">Inactivo</option>
        </select>

        <button id="btn-new-usuario" class="btn-new-usuario">
          + Nuevo
        </button>

      </div>

      <!-- =========================
           TABLA
      ========================= -->
      <div class="table-container">

        <table>

          <thead>
            <tr>
              <th>ID</th>
              <th>Usuario</th>
              <th>Email</th>
              <th>Rol</th>
              <th>Estado</th>
              <th>Fecha</th>
              <th>Acciones</th>
            </tr>
          </thead>

          <tbody id="usuarios-body">

            <!-- EJEMPLO FILA -->
            <tr>
              <td>USR-001</td>

              <td>
                <div class="cell-user">
                  <div class="avatar">AV</div>
                  <div class="user-info">
                    <span class="user-name">Ávila</span>
                    <span class="user-sub">Administrador</span>
                  </div>
                </div>
              </td>

              <td>avila@onion.com</td>
              <td>Admin</td>

              <td>
                <span class="badge activo">Activo</span>
              </td>

              <td>26/03/2026</td>

              <td class="acciones">
                <button data-action="edit">Editar</button>
                <button data-action="delete">Eliminar</button>
              </td>
            </tr>

            <!-- LOADING -->
            <tr class="loading">
              <td colspan="7">Cargando usuarios...</td>
            </tr>

          </tbody>

        </table>

      </div>

    </div>

  </div>

</div>
