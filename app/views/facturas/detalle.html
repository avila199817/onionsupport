<div class="panel-content factura-detalle">

  <!-- 🔥 LOADER (MISMO CONCEPTO GLOBAL) -->
  <div class="factura-loading" aria-hidden="true">
    <img class="loader-logo loader-dark" src="/media/img/favicon_white.png" draggable="false">
    <img class="loader-logo loader-light" src="/media/img/favicon_black.png" draggable="false">
  </div>

  <div class="layout-split">

    <!-- =========================
         LEFT
    ========================= -->
    <div class="detalle-left">

      <!-- TOP BAR -->
      <div class="filters-row" style="justify-content: space-between;">

        <div class="detalle-user">
          <div id="detalle-avatar" class="table-avatar"></div>

          <div class="user-info">
            <div class="detalle-value" id="detalle-cliente">--</div>

            <div class="detalle-meta">
              <span id="detalle-cliente-id"></span>
            </div>
          </div>
        </div>

        <button id="btn-back">
          ← Volver
        </button>

      </div>

      <!-- BODY -->
      <div class="detalle-body">

        <div id="detalle-content" style="width:100%;">

          <div class="form-grid">

            <div class="detalle-item">
              <div class="detalle-label">Factura</div>
              <div class="detalle-value" id="detalle-numero-legal">--</div>
            </div>

            <div class="detalle-item">
              <div class="detalle-label">ID Factura</div>
              <div class="detalle-value" id="detalle-id">--</div>
            </div>

            <div class="detalle-item">
              <div class="detalle-label">ID Incidencia</div>
              <div class="detalle-value" id="detalle-incidencia-id">--</div>
            </div>

            <div class="detalle-item">
              <div class="detalle-label">Fecha emisión</div>
              <div class="detalle-value" id="detalle-fecha">--</div>
            </div>

            <div class="detalle-item">
              <div class="detalle-label">Fecha vencimiento</div>
              <div class="detalle-value" id="detalle-vencimiento">--</div>
            </div>

            <div class="detalle-item">
              <div class="detalle-label">Método de pago</div>
              <div class="detalle-value" id="detalle-metodo">Transferencia</div>
            </div>

            <div class="detalle-item">
              <div class="detalle-label">Importe total</div>
              <div class="detalle-value" id="detalle-total">--</div>
            </div>

            <div class="detalle-item">
              <div class="detalle-label">Estado</div>
              <div class="detalle-value" id="detalle-estado">--</div>
            </div>

            <div class="detalle-item">
              <div class="detalle-label">IVA</div>
              <div class="detalle-value" id="detalle-iva">--</div>
            </div>

            <div class="detalle-item" id="detalle-irpf-container" style="display:none;">
              <div class="detalle-label">IRPF</div>
              <div class="detalle-value" id="detalle-irpf">--</div>
            </div>

            <div class="detalle-item" style="grid-column: span 2;">
              <div class="detalle-label">Concepto</div>
              <div class="detalle-value" id="detalle-concepto">--</div>
            </div>

            <div class="detalle-item" style="grid-column: span 2;">
              <div class="detalle-label">Descripción</div>

              <div id="detalle-descripcion" class="detalle-value"></div>
            </div>

          </div>

        </div>

      </div>

    </div>

    <!-- =========================
         RIGHT
    ========================= -->
    <aside class="detalle-right">

      <div class="detalle-sidebar">

        <div class="sidebar-section">
          <div class="sidebar-title">Documentos asociados</div>

          <div class="detalle-blobs">

            <div class="blob-item">
              <span>Factura PDF</span>

              <div class="blob-actions">
                <button id="btn-ver-factura">Ver</button>
                <button id="btn-descargar-factura">Descargar</button>
              </div>
            </div>

          </div>
        </div>

        <div class="sidebar-divider"></div>

        <div class="sidebar-section">
          <div class="sidebar-title">Historial de cambios</div>
          <div id="detalle-historial" class="detalle-blobs"></div>
        </div>

      </div>

    </aside>

  </div>

</div>
