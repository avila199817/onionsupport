<div class="panel-content facturas">

  <div class="table-system facturas">

    <div class="filters-row">

      <input 
        type="text"
        id="search-factura"
        placeholder="Buscar factura..."
        autocomplete="off"
      >

      <select id="filter-estado-factura">
        <option value="">Estado</option>
        <option value="pagada">Pagada</option>
        <option value="pendiente">Pendiente</option>
      </select>

      <button id="btn-new-factura" class="btn-new-factura">
        + Nueva
      </button>

    </div>

    <div class="table-container">

      <table>

        <thead>
          <tr>
            <th class="col-id" data-sort="numero">ID</th>
            <th class="col-main" data-sort="cliente">Cliente</th>
            <th class="col-date" data-sort="fecha">Fecha</th>
            <th class="col-importe" data-sort="total">Importe</th>
            <th class="col-status" data-sort="estadoPago">Estado</th>
            <th class="col-actions">Acciones</th>
          </tr>
        </thead>

        <tbody id="facturas-body">
          <tr class="loading">
            <td colspan="6">Cargando facturas...</td>
          </tr>
        </tbody>

      </table>

    </div>

  </div>

</div>
