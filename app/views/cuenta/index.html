<div class="panel-content cuenta">

  <div class="container">

    <!-- =========================
         AVATAR CENTRADO
    ========================= -->
    <div class="cuenta-avatar-section">

      <div class="avatar-wrapper">
        <img id="cuenta-avatar" src="/media/img/Usuario.png" alt="avatar">
      </div>

    </div>

    <!-- =========================
         CARDS USUARIO
    ========================= -->
    <div class="grid-cards">

      <!-- NOMBRE -->
      <div class="card highlight">
        <span class="card-title">Nombre completo</span>

        <div class="card-row">
          <span class="card-value" id="cuenta-nombre">--</span>
          <button class="btn-edit">Cambiar</button>
        </div>
      </div>

      <!-- EMAIL -->
      <div class="card">
        <span class="card-title">Correo</span>
        <span class="card-value" id="cuenta-email">--</span>
      </div>

      <!-- 2FA -->
      <div class="card">
        <span class="card-title">2FA</span>

        <div class="card-row">
          <span class="card-value" id="cuenta-2fa">Desactivado</span>
          <button class="btn-edit">Configurar</button>
        </div>
      </div>

      <!-- 🌙 DARK MODE -->
      <div class="card">
        <span class="card-title">Modo oscuro</span>

        <div class="card-row">
          <span class="card-value" id="cuenta-darkmode">Desactivado</span>

          <label class="switch">
            <input type="checkbox" id="toggle-darkmode">
            <span class="slider"></span>
          </label>
        </div>
      </div>

    </div>

    <!-- =========================
         KPI
    ========================= -->
    <div class="grid-cards">

      <div class="card highlight">
        <span class="card-title">Plan actual</span>
        <span class="card-value" id="cuenta-plan">--</span>
        <div class="card-meta">
          <span class="trend up">Activo</span>
          <span class="card-extra">suscripción</span>
        </div>
      </div>

      <div class="card">
        <span class="card-title">Miembro desde</span>
        <span class="card-value" id="cuenta-fecha">--</span>
        <div class="card-meta">
          <span class="card-extra">registro</span>
        </div>
      </div>

      <div class="card">
        <span class="card-title">ID Usuario</span>
        <span class="card-value" id="cuenta-id">--</span>
      </div>

    </div>

  </div>

</div>
