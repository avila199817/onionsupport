<div class="panel-content dashboard pro-saas">

  <!-- 🔥 LOADER -->
  <div class="dashboard-loading">
    <div class="dashboard-spinner"></div>
  </div>

  <div class="dashboard-container">

    <!-- =========================
         HEADER
    ========================= -->
    <div class="dashboard-header">

      <div class="dashboard-title">
        <h1>Dashboard</h1>
        <span>Control financiero</span>
      </div>

      <div class="dashboard-live">
        <span class="dot"></span>
        En vivo
      </div>

    </div>

    <!-- =========================
         HERO
    ========================= -->
    <div class="dashboard-hero">

      <span class="hero-label">Facturación mes actual</span>

      <strong id="home-facturacion-mes" class="hero-value">
        €0
      </strong>

    </div>

    <!-- =========================
         KPIs
    ========================= -->
    <div class="dashboard-kpis">

      <div class="kpi">
        <span>Total facturado</span>
        <strong id="home-facturas">€0</strong>
      </div>

      <div class="kpi">
        <span>Pendiente</span>
        <strong id="home-facturas-pendiente">€0</strong>
      </div>

      <div class="kpi">
        <span>Clientes</span>
        <strong id="home-clientes">0</strong>
      </div>

      <div class="kpi">
        <span>Usuarios</span>
        <strong id="home-usuarios">0</strong>
      </div>

    </div>

    <!-- =========================
         STATUS STRIP
    ========================= -->
    <div class="dashboard-strip">

      <div class="strip-item">
        API <strong id="status-api">-- ms</strong>
      </div>

      <div class="strip-item">
        DB <strong id="status-db">--</strong>
      </div>

      <div class="strip-item">
        Uptime <strong id="status-uptime">--</strong>
      </div>

    </div>

    <!-- =========================
         FACTURACIÓN ANUAL
    ========================= -->
    <div class="year-revenue">

      <div class="year-header">
        <h2 id="year-title">Facturación</h2>
      </div>

      <div class="year-grid">

        <!-- 🔥 12 MESES CON BAR -->
        <div class="month"><div class="bar"></div><span>Ene</span><strong>€0</strong></div>
        <div class="month"><div class="bar"></div><span>Feb</span><strong>€0</strong></div>
        <div class="month"><div class="bar"></div><span>Mar</span><strong>€0</strong></div>
        <div class="month"><div class="bar"></div><span>Abr</span><strong>€0</strong></div>
        <div class="month"><div class="bar"></div><span>May</span><strong>€0</strong></div>
        <div class="month"><div class="bar"></div><span>Jun</span><strong>€0</strong></div>
        <div class="month"><div class="bar"></div><span>Jul</span><strong>€0</strong></div>
        <div class="month"><div class="bar"></div><span>Ago</span><strong>€0</strong></div>
        <div class="month"><div class="bar"></div><span>Sep</span><strong>€0</strong></div>
        <div class="month"><div class="bar"></div><span>Oct</span><strong>€0</strong></div>
        <div class="month"><div class="bar"></div><span>Nov</span><strong>€0</strong></div>
        <div class="month"><div class="bar"></div><span>Dic</span><strong>€0</strong></div>

      </div>

    </div>

    <!-- =========================
         ACTIVIDAD
    ========================= -->
    <div class="dashboard-activity">

      <div class="activity-header">
        Actividad reciente
      </div>

      <div id="activity-list" class="activity-list">

        <div class="activity-item">
          <div class="activity-title">Cargando actividad...</div>
          <div class="activity-meta">Esperando datos</div>
        </div>

      </div>

    </div>

  </div>

</div>
