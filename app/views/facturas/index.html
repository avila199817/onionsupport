<div class="panel-content facturas">

  <div class="table-system facturas">

    <!-- =========================
         FILTROS
    ========================= -->
    <div class="filters-row">

      <input 
        type="text"
        id="search-factura"
        placeholder="Buscar factura..."
        autocomplete="off"
      >

      <select id="filter-estado-factura">
        <option value="">Estado pago</option>
        <option value="pagada">Pagada</option>
        <option value="pendiente">Pendiente</option>
      </select>

      <button id="btn-new-factura" class="btn-new-factura">
        + Nueva
      </button>

    </div>

    <!-- =========================
         TABLA
    ========================= -->
    <div class="table-container">

      <table>

        <thead>
          <tr>
            <th class="col-id">ID</th>
            <th class="col-main">Cliente</th>
            <th class="col-secondary">Empresa</th>
            <th class="col-date">Fecha</th>
            <th class="col-importe">Importe</th>
            <th class="col-status">Pago</th>
            <th class="col-actions">Acciones</th>
          </tr>
        </thead>

        <tbody id="facturas-body">

          <!-- 🔥 SKELETON LOADING PRO -->
          <tr class="loading-row">
            <td colspan="7">
              
              <div class="skeleton-table">

                <div class="skeleton-row">
                  <div class="sk id"></div>
                  <div class="sk user"></div>
                  <div class="sk company"></div>
                  <div class="sk date"></div>
                  <div class="sk amount"></div>
                  <div class="sk status"></div>
                  <div class="sk actions"></div>
                </div>

                <div class="skeleton-row">
                  <div class="sk id"></div>
                  <div class="sk user"></div>
                  <div class="sk company"></div>
                  <div class="sk date"></div>
                  <div class="sk amount"></div>
                  <div class="sk status"></div>
                  <div class="sk actions"></div>
                </div>

                <div class="skeleton-row">
                  <div class="sk id"></div>
                  <div class="sk user"></div>
                  <div class="sk company"></div>
                  <div class="sk date"></div>
                  <div class="sk amount"></div>
                  <div class="sk status"></div>
                  <div class="sk actions"></div>
                </div>

              </div>

            </td>
          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>
