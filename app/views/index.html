<div class="panel-content dashboard cc-v2">

  <!-- 🔥 LOADER -->
  <div class="dashboard-loading">
    <div class="dashboard-spinner"></div>
  </div>

  <div class="ccv2-container">

    <!-- =========================
         HEADER
    ========================= -->
    <div class="ccv2-header">

      <div class="ccv2-title">
        <h1>Dashboard</h1>
        <span>Control total del sistema</span>
      </div>

      <div class="ccv2-live">
        <span class="dot"></span>
        En vivo
      </div>

    </div>

    <!-- =========================
         HERO (🔥 PROTAGONISTA)
    ========================= -->
    <div class="ccv2-hero">

      <div class="ccv2-hero-main">
        <span>Facturación hoy</span>
        <strong id="home-facturacion-mes">€0</strong>
      </div>

      <div class="ccv2-hero-stats">

        <div class="mini-stat">
          <span>Usuarios</span>
          <strong id="home-usuarios">0</strong>
        </div>

        <div class="mini-stat">
          <span>Clientes</span>
          <strong id="home-clientes">0</strong>
        </div>

        <div class="mini-stat">
          <span>Tickets</span>
          <strong id="tickets-hoy">0</strong>
        </div>

      </div>

    </div>

    <!-- =========================
         STATUS STRIP
    ========================= -->
    <div class="ccv2-strip">

      <div class="strip-item">
        API <strong id="status-api">-- ms</strong>
      </div>

      <div class="strip-item">
        DB <strong id="status-db">--</strong>
      </div>

      <div class="strip-item">
        Uptime <strong id="status-uptime">--</strong>
      </div>

      <div class="strip-item">
        CPU <strong id="cpu-usage">--%</strong>
      </div>

      <div class="strip-item">
        RAM <strong id="ram-usage">--%</strong>
      </div>

      <div class="strip-item">
        Disco <strong id="disk-usage">--%</strong>
      </div>

    </div>

    <!-- =========================
         ACTIONS FLOAT
    ========================= -->
    <div class="ccv2-actions">

      <button>+ Usuario</button>
      <button>+ Cliente</button>
      <button>+ Factura</button>
      <button>+ Ticket</button>

    </div>

    <!-- =========================
         ACTIVITY
    ========================= -->
    <div class="ccv2-activity">

      <div class="ccv2-activity-header">
        Actividad en tiempo real
      </div>

      <div id="activity-list" class="ccv2-activity-list">
        <div class="ccv2-activity-item">
          <div>Cargando actividad...</div>
          <span>Esperando datos</span>
        </div>
      </div>

    </div>

  </div>

</div>
