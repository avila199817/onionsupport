<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onion Support</title>

<script>

(function(){

  const path = window.location.pathname;

  if(
    path.startsWith("/es/") ||
    path.startsWith("/es")
  ){
    return;
  }

  // 👉 si entras a raíz → te manda a /es/
  window.location.replace("/es/");

})();

</script>

</head>
<body></body>
</html>
