<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Confirmar identidad · Onion Support</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🚫 NO INDEXAR -->
  <meta name="robots" content="noindex, nofollow">

  <!-- Canonical -->
  <link rel="canonical" href="https://onionsupport.com/es/acceso/2fa/confirm/" />

  <!-- FAVICON -->
  <link
    rel="icon"
    type="image/png"
    href="https://onionassets.z43.web.core.windows.net/media/img/favicon_support.png"
  >
  <link
    rel="apple-touch-icon"
    href="https://onionassets.z43.web.core.windows.net/media/img/Favicon/favicon_support.ico"
  >

  <!-- CSS reutilizado -->
  <link rel="stylesheet" href="/css/nav/acceso.css">
  <link rel="stylesheet" href="/css/acceso/password/password.css">
</head>

<body>

  <!-- Flecha volver -->
  <a href="/es/acceso/admin/cuenta/" class="back-arrow" aria-label="Volver"></a>

  <div class="login-card">

    <!-- Header -->
    <div class="login-header">
      <img
        src="https://onionassets.z43.web.core.windows.net/media/img/Favicon/favicon_support.ico"
        alt="Onion Support"
        width="48"
        height="48"
      >
      <h2>Confirmar identidad</h2>
      <p>Introduce el código de tu aplicación de autenticación</p>
    </div>

    <!-- Formulario -->
    <form id="confirm2faForm" novalidate>

      <!-- Error -->
      <div class="login-error" style="display:none;"></div>

      <!-- 🔢 CÓDIGO 2FA EN 6 CAJAS -->
      <div class="login-field code-grid">
        <input type="text" inputmode="numeric" maxlength="1" class="code-box" autocomplete="one-time-code">
        <input type="text" inputmode="numeric" maxlength="1" class="code-box">
        <input type="text" inputmode="numeric" maxlength="1" class="code-box">
        <span class="code-separator">-</span>
        <input type="text" inputmode="numeric" maxlength="1" class="code-box">
        <input type="text" inputmode="numeric" maxlength="1" class="code-box">
        <input type="text" inputmode="numeric" maxlength="1" class="code-box">
      </div>

      <!-- 🔒 INPUT REAL -->
      <input type="hidden" id="code" name="code" required>

      <button type="submit" class="login-button">
        Confirmar
      </button>

      <div class="login-reset">
        <a href="/es/acceso/admin/cuenta/">
          Cancelar
        </a>
      </div>

    </form>

    <!-- Footer -->
    <div class="login-footer">
      © 2026 Onion Support
    </div>

  </div>

  <!-- JS -->
  <script src="/js/acceso/2fa/confirm.js"></script>

</body>
</html>
