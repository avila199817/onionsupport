<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Onion Support · Panel</title>
<meta name="robots" content="noindex, nofollow">

<link rel="icon" href="/favicon.ico">

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<!-- CSS BASE -->
<link rel="stylesheet" href="/css/core/core.css">

<!-- CSP -->
<meta http-equiv="Content-Security-Policy"
content="
default-src 'self';
connect-src 'self' https://api.onionit.net;
img-src 'self' data: https://onionassets.blob.core.windows.net;
script-src 'self';
style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
font-src 'self' https://fonts.gstatic.com;
">

<!-- LOADER BASE -->
<style>
html,body{margin:0;padding:0}
body.loading{overflow:hidden}

#app-loader{
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
</style>

</head>

<body class="loading">

<!-- LOADER -->
<div id="app-loader">
  <img src="/media/img/favicon_black.png" width="60" alt="Loading">
</div>

<!-- APP ROOT -->
<div id="app-root" class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="sidebar-top">
      <a href="/" class="logo">
        <img src="/media/img/favicon_white.png" alt="logo">
      </a>

      <button id="toggleSidebar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="4" width="18" height="16" rx="3" stroke="currentColor" stroke-width="1.6"/>
          <path d="M9 4v16" stroke="currentColor" stroke-width="1.6"/>
        </svg>
      </button>
    </div>

    <nav class="sidebar-menu">

      <a href="/" data-link class="menu-item">
        <span>Inicio</span>
      </a>

      <a href="/incidencias" data-link class="menu-item">
        <span>Incidencias</span>
      </a>

      <a href="/facturas" data-link class="menu-item">
        <span>Facturas</span>
      </a>

      <a href="/cuenta" data-link class="menu-item">
        <span>Cuenta</span>
      </a>

    </nav>

    <!-- USER -->
    <div class="sidebar-footer">

      <div id="userToggle" class="user">

        <div id="sidebar-avatar" class="avatar">ON</div>

        <div class="user-info">
          <span id="sidebar-name">Usuario</span>
          <span class="plan">Plan</span>
        </div>

      </div>

      <!-- DROPDOWN -->
      <div id="userDropdown" class="user-dropdown">

        <div class="dropdown-item">Perfil</div>
        <div class="dropdown-item">Configuración</div>

        <div class="dropdown-divider"></div>

        <div class="dropdown-item" id="logoutBtn">
          Cerrar sesión
        </div>

      </div>

    </div>

  </aside>

  <!-- MAIN -->
  <main id="app-view" class="main">

    <!-- TOPBAR -->
    <header class="topbar">

      <h1 id="topbar-title">Panel</h1>

      <div class="search">

        <input id="topbar-search" placeholder="Buscar..." autocomplete="off">

        <div id="topbar-search-results"></div>

      </div>

    </header>

    <!-- CONTENIDO DINÁMICO -->
    <section id="app-content"></section>

  </main>

</div>

<!-- =========================
     SCRIPTS (ORDEN CRÍTICO)
========================= -->

<!-- CORE -->
<script src="/js/core/core.js"></script>
<script src="/js/core/events.js"></script>
<script src="/js/core/cleanup.js"></script>

<!-- FEATURES -->
<script src="/js/features/fetch.js"></script>
<script src="/js/features/auth.js"></script>
<script src="/js/features/router.js"></script>
<script src="/js/features/prefetch.js"></script>
<script src="/js/features/render.js"></script>

<!-- UI -->
<script src="/js/ui/ui.js"></script>
<script src="/js/ui/search.js"></script>
<script src="/js/ui/loader.js"></script>

<!-- INIT -->
<script src="/js/init/init.js"></script>
<script src="/js/init/boot.js"></script>

</body>
</html>
