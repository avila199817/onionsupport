<div class="panel-content dashboard home">

  <div class="container">

    <!-- =========================
         HEADER
    ========================= -->
    <div class="dashboard-header">
      <div class="header-left">
        <h1 class="page-title">Dashboard</h1>
        <p class="page-subtitle">Resumen general del sistema</p>
      </div>
    </div>

    <!-- =========================
         KPI CARDS
    ========================= -->
    <div class="grid-cards">

      <div class="card">
        <span class="card-title">Incidencias</span>
        <strong id="home-incidencias" class="card-value">0</strong>
      </div>

      <div class="card">
        <span class="card-title">Clientes</span>
        <strong id="home-clientes" class="card-value">0</strong>
      </div>

      <div class="card">
        <span class="card-title">Usuarios</span>
        <strong id="home-usuarios" class="card-value">0</strong>
      </div>

      <div class="card">
        <span class="card-title">Facturación</span>
        <strong id="home-facturas" class="card-value">€0</strong>
      </div>

    </div>

    <!-- =========================
         SUMMARY
    ========================= -->
    <div class="summary-grid">

      <div class="summary-item">
        <div class="summary-value">0</div>
        <div class="summary-label">Tickets hoy</div>
      </div>

      <div class="summary-item">
        <div class="summary-value">0</div>
        <div class="summary-label">Resueltos</div>
      </div>

      <div class="summary-item">
        <div class="summary-value">0</div>
        <div class="summary-label">Pendientes</div>
      </div>

    </div>

    <!-- =========================
         MAIN GRID
    ========================= -->
    <div class="dashboard-grid">

      <!-- ACTIVITY -->
      <div class="panel-block">
        <div class="section-title">Actividad reciente</div>

        <div id="activity-list" class="activity-list">
          <div>Cargando...</div>
        </div>
      </div>

      <!-- SYSTEM -->
      <div class="panel-block">
        <div class="section-title">Estado del sistema</div>

        <div class="status-list">

          <div id="status-api">API --</div>
          <div id="status-db">DB --</div>
          <div id="status-uptime">Uptime --</div>

          <div id="cpu-usage">CPU: --</div>
          <div id="ram-usage">RAM: --</div>
          <div id="disk-usage">Disco: --</div>

          <div id="system-warning" class="alert-item" style="display:none; color:#c00;">
            ⚠️ Alta carga del sistema
          </div>

        </div>
      </div>

    </div>

  </div>

</div>
