<div class="panel-content facturas">

  <div class="table-system facturas">

    <!-- =========================
         FILTROS
    ========================= -->
    <div class="filters-row">

      <input 
        type="text"
        id="search-factura"
        placeholder="Buscar factura..."
        autocomplete="off"
      >

      <select id="filter-estado-factura">
        <option value="">Estado pago</option>
        <option value="pagada">Pagada</option>
        <option value="pendiente">Pendiente</option>
      </select>

      <button id="btn-new-factura" class="btn-new-factura">
        + Nueva
      </button>

    </div>


    <!-- =========================
         TABLA
    ========================= -->
    <div class="table-container">

      <table>

        <thead>
          <tr>
            <th class="col-id" data-sort="numeroFacturaLegal">ID</th>
            <th class="col-main" data-sort="cliente">Cliente</th>
            <th class="col-secondary" data-sort="empresa">Empresa</th>
            <th class="col-date" data-sort="fechaFactura">Fecha</th>
            <th class="col-importe" data-sort="total">Importe</th>
            <th class="col-status" data-sort="estadoPago">Pago</th>
            <th class="col-status" data-sort="estado">Estado</th>
            <th class="col-method" data-sort="formaPago">Método</th>
            <th class="col-date" data-sort="fechaEnvio">Envío</th>
          </tr>
        </thead>

        <tbody id="facturas-body">

          <tr class="loading">
            <td colspan="9">Cargando facturas...</td>
          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>
