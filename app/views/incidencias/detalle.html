<div class="panel-content incidencia-detalle">

  <div class="layout-split">

    <!-- =========================
         LEFT
    ========================= -->
    <div class="detalle-left">

      <!-- TOP BAR -->
      <div class="filters-row">

        <div class="detalle-user">
          <div id="detalle-avatar" class="table-avatar"></div>

          <div class="user-info">
            <div class="detalle-value" id="detalle-usuario">--</div>

            <div class="detalle-meta">
              <span id="detalle-userid"></span>
            </div>
          </div>
        </div>

        <button id="btn-back">
          ← Volver
        </button>

      </div>

      <!-- BODY -->
      <div class="detalle-body">

        <div id="detalle-content" style="width:100%;">

          <div class="form-grid">

            <!-- ID -->
            <div class="detalle-item">
              <div class="detalle-label">ID</div>
              <div class="detalle-value" id="detalle-id">--</div>
            </div>

            <!-- FECHA CREACIÓN -->
            <div class="detalle-item">
              <div class="detalle-label">Fecha de creación</div>
              <div class="detalle-value" id="detalle-fecha">--</div>
            </div>

            <!-- FECHA CIERRE -->
            <div class="detalle-item">
              <div class="detalle-label">Fecha cierre</div>
              <div class="detalle-value" id="detalle-fecha-cierre">--</div>
            </div>

            <!-- TÉCNICO -->
            <div class="detalle-item">
              <div class="detalle-label">Técnico asignado</div>
              <div class="detalle-value" id="detalle-tecnico">--</div>
            </div>

            <!-- TÍTULO -->
            <div class="detalle-item" style="grid-column: span 2;">
              <div class="detalle-label">Título</div>
              <div class="detalle-value" id="detalle-titulo">--</div>
            </div>

            <!-- MENSAJE -->
            <div class="detalle-item" style="grid-column: span 2;">
              <div class="detalle-label">Mensaje</div>

              <div 
                id="detalle-mensaje"
                class="detalle-value detalle-editable"
                contenteditable="false"
              ></div>
            </div>

            <!-- ESTADO -->
            <div class="detalle-item">
              <div class="detalle-label">Estado</div>

              <select id="edit-estado" class="detalle-select">
                <option value="open">Abierta</option>
                <option value="closed">Cerrada</option>
              </select>
            </div>

            <!-- PRIORIDAD -->
            <div class="detalle-item">
              <div class="detalle-label">Prioridad</div>

              <select id="edit-prioridad" class="detalle-select">
                <option value="low">Baja</option>
                <option value="medium">Media</option>
                <option value="high">Alta</option>
              </select>
            </div>

            <!-- =========================
                 ADJUNTOS (MISMO QUE CREATE)
            ========================= -->
            <div class="detalle-item" style="grid-column: span 2;">
              <div class="detalle-label">Adjuntos del usuario</div>

              <div class="incidencia-files">

                <button type="button" id="btn-attach">
                  + Añadir archivos
                </button>

                <input 
                  type="file"
                  id="inc-files"
                  multiple
                  hidden
                >

                <div id="file-list" class="file-list"></div>

              </div>
            </div>

          </div>

          <!-- FOOTER -->
          <div class="detalle-footer">

            <div class="detalle-hint">
              Puedes cerrar la incidencia o eliminar archivos adjuntos
            </div>

            <button id="btn-save">
              Guardar cambios
            </button>

          </div>

        </div>

      </div>

    </div>

    <!-- =========================
         RIGHT
    ========================= -->
    <aside class="detalle-right">

      <div class="detalle-sidebar">

        <!-- USUARIO -->
        <div class="sidebar-section">
          <div class="sidebar-title">Archivos aportados</div>
          <div id="detalle-blobs-user" class="detalle-blobs"></div>
        </div>

        <div class="sidebar-divider"></div>

        <!-- SOPORTE -->
        <div class="sidebar-section">
          <div class="sidebar-title">Adjuntos del equipo de soporte</div>
          <div id="detalle-blobs-team" class="detalle-blobs"></div>
        </div>

      </div>

    </aside>

  </div>

</div>
