<div class="panel-content clientes table-mode">

  <!-- 🔥 TABLE SYSTEM (FULL WIDTH REAL) -->
  <div class="table-system clientes">

    <!-- =========================
         FILTROS
    ========================= -->
    <div class="filters-row">

      <input 
        type="text"
        id="search-cliente"
        placeholder="Buscar cliente..."
        autocomplete="off"
      >

      <select id="filter-estado-cliente">
        <option value="">Estado</option>
        <option value="activo">Activo</option>
        <option value="inactivo">Inactivo</option>
      </select>

      <select id="filter-tipo-cliente">
        <option value="">Tipo</option>
        <option value="particular">Particular</option>
        <option value="empresa">Empresa</option>
      </select>

      <button id="btn-new-cliente" class="btn-new-cliente">
        + Nuevo
      </button>

    </div>


    <!-- =========================
         TABLA
    ========================= -->
    <div class="table-container">

      <table>

        <thead>
          <tr>
            <th class="col-id">ID</th>
            <th class="col-main">Cliente</th>
            <th class="col-secondary">Ubicación</th>
            <th class="col-secondary">Tipo</th>
            <th class="col-status">Estado</th>
            <th class="col-date">Alta</th>
          </tr>
        </thead>

        <tbody id="clientes-body">

          <tr class="loading">
            <td colspan="6">Cargando clientes...</td>
          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>
