<!-- LOADER BASE -->
<style>
html,body{margin:0;padding:0}
body.loading{overflow:hidden}

#app-loader{
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

<body class="loading">

<!-- LOADER -->

</div>


<!-- 🔥 LAYOUT COMPLETO -->
<div class="layout">

<aside class="sidebar">

  <!-- TOP -->

    </a>

    <!-- BOTÓN CERRAR -->
    <button class="sidebar-toggle" id="toggleSidebar" data-tooltip="Cerrar barra lateral">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="4" width="18" height="16" rx="3"
        stroke="currentColor" stroke-width="1.6"/>
        <path d="M9 4v16"
        stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </button>

  </div>

    <a href="/facturas" data-link class="menu-item">
      <span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M6 2h9l5 5v15H6z"

          <path d="M14 2v6h6"
          stroke="currentColor" stroke-width="1.6"/>
        </svg>
      </span>
      <span>Facturas</span>
    </a>

    <a href="/usuarios" data-link class="menu-item">
      <span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">

          stroke="currentColor" stroke-width="1.6"/>
        </svg>
      </span>
      <span>Usuarios</span>
    </a>

    <a href="/clientes" data-link class="menu-item">
      <span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">

          <path d="M5.5 21a6.5 6.5 0 0113 0"

      </span>
      <span>Cuenta</span>
    </a>

    <a href="/ajustes" data-link class="menu-item">

          <path d="M4 12h6"

          <circle cx="12" cy="12" r="2"

          <path d="M4 18h12"

          <circle cx="18" cy="18" r="2"
          stroke="currentColor" stroke-width="1.6"/>
        </svg>
      </span>
      <span>Ajustes</span>

  <!-- RECIENTES -->
  <div class="sidebar-section">
    <span class="section-title">Recientes</span>

    <a href="/incidencias" data-link class="chat-item">Incidencia servidor</a>
    <a href="/incidencias" data-link class="chat-item">Error cliente factura</a>
    <a href="/incidencias" data-link class="chat-item">Login usuarios</a>
    <a href="/incidencias" data-link class="chat-item">Backup DB</a>
  </div>

  <!-- USER -->
  <div class="sidebar-footer">
    <div class="user" id="userToggle">

      <div class="avatar" id="sidebar-avatar" aria-label="Avatar usuario">ON</div>

      <div class="user-info">
        <span class="name" id="sidebar-name">Usuario</span>
        <span class="plan">Go Plan</span>
      </div>

      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M9 6l6 6-6 6"
        stroke="currentColor" stroke-width="1.6"/>
      </svg>

    </div>

<!-- DROPDOWN -->
  <div class="user-dropdown" id="userDropdown">

    <div class="dropdown-item">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path d="M12 5v14M5 12h14" stroke="white" stroke-width="1.6"/>
      </svg>
      Añadir cuenta
    </div>

    <div class="dropdown-divider"></div>

   <div class="dropdown-item">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">

    </div>

    <div class="dropdown-item">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path d="M4 12h16" stroke="white" stroke-width="1.6"/>

    <div class="dropdown-item">

      <path d="M12 16v-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      <circle cx="12" cy="8" r="1" fill="currentColor"/>
    </svg>
    Ayuda
    </div>

    <div class="dropdown-item" id="logoutBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M16 17l5-5-5-5M21 12H9" stroke="white" stroke-width="1.6"/>
        <path d="M4 4h5v16H4z" stroke="white" stroke-width="1.6"/>

  </div>

<main id="app-view" class="main-content" role="main">










  

  
<header class="topbar">

  <div class="topbar-left">
    <h1 class="topbar-title" id="topbar-title">Panel</h1>
  </div>

  <div class="topbar-right">

    <!-- SEARCH -->
    <div class="topbar-search-wrap">

      <svg class="topbar-search-icon" viewBox="0 0 24 24" fill="none">
        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
        <path d="M20 20l-3-3" stroke="currentColor" stroke-width="2"/>
      </svg>

      <input 
        type="text"
        id="topbar-search"
        class="topbar-search"
        placeholder="Buscar..."
        autocomplete="off"
      >

      <div id="topbar-search-results" class="topbar-search-results"></div>

    </div>

  </div>

</header>









  

  
  <div id="app-content"></div>
</main>




</div>
