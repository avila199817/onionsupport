<script defer>

(function(){

"use strict";

/* =========================
   INIT GUARD (ANTI-DUPLICADOS)
========================= */

if (window.__appInit) return;
window.__appInit = true;


/* =========================
   HELPERS
========================= */

const $ = (sel, ctx = document) => ctx.querySelector(sel);
const $$ = (sel, ctx = document) => ctx.querySelectorAll(sel);


/* =========================
   SIDEBAR RENDER
========================= */

function renderSidebar(){

  const user = window.Onion?.state?.user;
  if (!user) return;

  const nameEl = $("#sidebar-name");
  const avatarEl = $("#sidebar-avatar");

  if (!nameEl || !avatarEl) return;

  const name =
    user.name ||
    user.username ||
    user.email ||
    "Usuario";

  nameEl.textContent = name;

  avatarEl.innerHTML = "";

  if (user.avatar){

    const img = document.createElement("img");
    img.src = user.avatar;
    img.alt = "avatar";

    Object.assign(img.style, {
      width: "100%",
      height: "100%",
      borderRadius: "50%",
      objectFit: "cover"
    });

    avatarEl.appendChild(img);

  } else {

    const initials = name
      .split(" ")
      .map(n => n[0])
      .join("")
      .substring(0,2)
      .toUpperCase();

    avatarEl.textContent = initials;

  }

  console.log("✅ SIDEBAR OK");
}


/* =========================
   TOPBAR RENDER
========================= */

function renderTopbar(){

  const route = window.Onion?.router?.get?.();
  const titleEl = $("#topbar-title");

  if (!titleEl) return;

  const titles = {
    "/": "Onion Support",
    "/incidencias": "Incidencias",
    "/facturas": "Facturas",
    "/cuenta": "Cuenta"
  };

  titleEl.textContent = titles[route] || "Panel";

  console.log("✅ TOPBAR OK");
}


/* =========================
   SIDEBAR ACTIVE LINK
========================= */

function updateSidebarActive(){

  const route = window.Onion?.router?.get?.();

  $$(".sidebar a[data-link]").forEach(a => {
    const href = a.getAttribute("href");
    a.classList.toggle("active", href === route);
  });

}


/* =========================
   SIDEBAR TOGGLE + TOOLTIP
========================= */

function initSidebar(){

  const sidebar = $(".sidebar");
  const toggleBtn = $("#toggleSidebar");

  if (!sidebar) return;

  const updateTooltip = () => {
    if (!toggleBtn) return;

    const collapsed = sidebar.classList.contains("collapsed");

    toggleBtn.setAttribute(
      "data-tooltip",
      collapsed ? "Abrir barra lateral" : "Cerrar barra lateral"
    );
  };

  // estado guardado
  const saved = localStorage.getItem("sidebar-collapsed");
  if (saved === "true"){
    sidebar.classList.add("collapsed");
  }

  updateTooltip();

  if (toggleBtn){

    toggleBtn.addEventListener("click", () => {

      const collapsed = sidebar.classList.contains("collapsed");

      sidebar.classList.toggle("collapsed");
      localStorage.setItem("sidebar-collapsed", !collapsed);

      updateTooltip();

      // cerrar dropdown si existe
      $("#userDropdown")?.classList.remove("active");

    });

  }

}


/* =========================
   DROPDOWN USUARIO
========================= */

function initUserDropdown(){

  const toggle = $("#userToggle");
  const dropdown = $("#userDropdown");
  const sidebar = $(".sidebar");

  if (!toggle || !dropdown || !sidebar) return;

  toggle.addEventListener("click", (e)=>{

    e.stopPropagation();

    const collapsed = sidebar.classList.contains("collapsed");

    if (collapsed){

      sidebar.classList.remove("collapsed");
      localStorage.setItem("sidebar-collapsed", false);

      setTimeout(()=> dropdown.classList.add("active"), 180);

    } else {
      dropdown.classList.toggle("active");
    }

  });

  dropdown.addEventListener("click", e => e.stopPropagation());

  document.addEventListener("click", ()=>{
    dropdown.classList.remove("active");
  });

}


/* =========================
   LOGOUT
========================= */

function initLogout(){

  const btn = $("#logoutBtn");
  if (!btn) return;

  btn.addEventListener("click", async (e)=>{

    e.preventDefault();

    try {

      localStorage.removeItem("onion_token");
      sessionStorage.clear();

      document.cookie.split(";").forEach(c => {
        document.cookie = c
          .replace(/^ +/, "")
          .replace(/=.*/, "=;expires=" + new Date(0).toUTCString() + ";path=/");
      });

      try{
        await fetch("/api/logout", {
          method: "POST",
          credentials: "include"
        });
      } catch {}

    } finally {
      window.location.replace("/login");
    }

  });

}


/* =========================
   🔎 SEARCH (SPA READY)
========================= */

function initSearch(){

  const input = $("#topbar-search");
  const container = $("#topbar-search-results");

  if (!input || !container) return;
  if (input.__init) return;

  input.__init = true;

  let timer;
  let activeIndex = -1;

  const show = () => container.classList.add("active");
  const hide = () => {
    container.classList.remove("active");
    container.innerHTML = "";
    activeIndex = -1;
  };

  const highlight = (text, q) => {
    if (!q) return text;
    const i = text.toLowerCase().indexOf(q.toLowerCase());
    if (i === -1) return text;

    return text.slice(0,i) +
      "<mark>" + text.slice(i,i+q.length) + "</mark>" +
      text.slice(i+q.length);
  };

  const render = (results, q="") => {

    container.innerHTML = "";

    if (!results.length){
      container.innerHTML = '<div class="search-empty">Sin resultados</div>';
      return show();
    }

    results.slice(0,20).forEach(r => {

      const el = document.createElement("div");
      el.className = "search-result";

      el.innerHTML = `
        <div class="search-text">
          <div class="search-title">${highlight(r.title || "", q)}</div>
          ${r.subtitle ? `<div class="search-subtitle">${highlight(r.subtitle, q)}</div>` : ""}
        </div>
      `;

      el.addEventListener("click", ()=>{
        hide();
        if (r.url) window.Onion.go(r.url);
      });

      container.appendChild(el);

    });

    show();

  };

  const search = async (q) => {

    try{
      const url = window.Onion.config.API + "/search?q=" + encodeURIComponent(q);
      const data = await window.Onion.fetch(url);
      return data?.results || [];
    }catch(e){
      console.error("SEARCH ERROR", e);
      return [];
    }

  };

  input.addEventListener("input", ()=>{

    const v = input.value.trim();
    clearTimeout(timer);

    if (!v) return hide();

    timer = setTimeout(async ()=>{
      const res = await search(v);
      render(res, v);
    }, 200);

  });

  input.addEventListener("focus", async ()=>{
    const v = input.value.trim();
    if (!v) return;

    const res = await search(v);
    render(res, v);
  });

  // cerrar fuera
  if (!window.__searchClick){
    window.__searchClick = true;

    document.addEventListener("click", e=>{
      if (!e.target.closest(".topbar-search-wrap")){
        hide();
      }
    });
  }

  // integración SPA
  window.Onion?.events?.on("nav:search:close", hide);

}


/* =========================
   LOADER
========================= */

function hideLoader(){

  const loader = $("#app-loader");

  if (loader){
    loader.classList.add("hide");
    setTimeout(()=> loader.remove(), 350);
  }

  document.body.classList.remove("loading");

}


/* =========================
   INIT APP
========================= */

function init(){

  renderSidebar();
  renderTopbar();
  updateSidebarActive();

  initSidebar();
  initUserDropdown();
  initLogout();
  initSearch();

  setTimeout(hideLoader, 4000);

}


/* =========================
   SPA HOOKS
========================= */

window.Onion?.events?.on("nav:ready", () => {
  renderTopbar();
  updateSidebarActive();
  initSearch();
});

// 🔥 CUANDO LLEGA EL USER
window.Onion?.events?.on("user:changed", () => {
  renderSidebar();
});
  
/* =========================
   FIRST LOAD
========================= */

document.addEventListener("DOMContentLoaded", init, { once: true });

})();
</script>
