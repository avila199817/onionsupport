<div class="panel-content facturas">

  <div class="container">

    <div class="panel-block">

      <!-- =========================
           FILTROS
      ========================= -->
      <div class="filters-row">

        <input 
          type="text"
          id="search-factura"
          placeholder="Buscar factura..."
          autocomplete="off"
        >

        <select id="filter-estado-factura">
          <option value="">Estado</option>
          <option value="pagada">Pagada</option>
          <option value="pendiente">Pendiente</option>
        </select>

        <!-- CTA -->
        <button id="btn-new-factura" class="btn-new-factura">
          + Nueva
        </button>

      </div>

      <!-- =========================
           TABLA
      ========================= -->
      <div class="table-container">

        <table>

          <thead>
            <tr>
              <th>ID</th>
              <th>Cliente</th>
              <th>Fecha</th>
              <th>Importe</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>

          <tbody id="facturas-body">
            <tr class="loading">
              <td colspan="6">Cargando facturas...</td>
            </tr>
          </tbody>

        </table>

      </div>

    </div>

  </div>

</div>
