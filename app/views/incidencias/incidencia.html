<div class="panel-content incidencia-create">

  <!-- HEADER -->
  <div class="filters-row">

    <button id="btn-back">
      ← Volver
    </button>

    <div style="margin-left:10px;">
      <div class="page-title">
        Hola, Javier 👋
      </div>
      <div class="page-subtitle">
        ¿En qué te podemos ayudar?
      </div>
    </div>

  </div>

  <!-- FORM -->
  <div class="form-wrapper">

    <div class="form-grid">

      <input 
        type="text"
        id="inc-title"
        placeholder="Asunto — Ej: No puedo acceder a mi cuenta"
      >

      <textarea 
        id="inc-message"
        placeholder="Cuéntanos qué está pasando..."
        rows="6"
      ></textarea>

      <div class="form-actions">
        <button id="btn-save-incidencia">
          Enviar incidencia
        </button>
      </div>

    </div>

  </div>

</div>
