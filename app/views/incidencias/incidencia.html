<div class="panel-content incidencia-create">

  <!-- HEADER -->
  <div class="filters-row">

    <button id="btn-back">
      ← Volver
    </button>

    <div style="margin-left:10px;">
      <div class="page-title">
        Hola, Javier 👋
      </div>
      <div class="page-subtitle">
        ¿En qué te podemos ayudar?
      </div>
    </div>

  </div>

  <!-- FORM -->
  <div class="form-wrapper">

    <div class="form-grid">

      <!-- ASUNTO -->
      <input 
        type="text"
        id="inc-title"
        placeholder="Asunto — Ej: No puedo acceder a mi cuenta"
      >

      <!-- MENSAJE -->
      <textarea 
        id="inc-message"
        placeholder="Cuéntanos qué está pasando..."
        rows="6"
      ></textarea>

      <!-- =========================
           ADJUNTOS
      ========================= -->
      <div>

        <!-- botón -->
        <button type="button" id="btn-attach">
          + Añadir archivos
        </button>

        <!-- input oculto -->
        <input 
          type="file"
          id="inc-files"
          multiple
          style="display:none"
        >

        <!-- lista de archivos -->
        <div id="file-list" style="margin-top:8px; font-size:12px; color:var(--dim);"></div>

      </div>

      <!-- CTA -->
      <div class="form-actions">
        <button id="btn-save-incidencia">
          Enviar incidencia
        </button>
      </div>

    </div>

  </div>

</div>
