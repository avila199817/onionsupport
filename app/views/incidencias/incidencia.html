<div class="panel-content incidencia-create">

  <div class="container">

    <div class="panel-block">

      <!-- =========================
           HEADER
      ========================= -->
      <div class="filters-row">

        <button id="btn-back">
          ← Volver
        </button>

        <div class="page-header" style="margin-left:10px;">
          <div>
            <div class="page-title">Nueva incidencia</div>
            <div class="page-subtitle">Crea un nuevo ticket</div>
          </div>
        </div>

      </div>

      <!-- =========================
           FORM
      ========================= -->
      <div class="form-wrapper">

        <div class="form-grid">

          <!-- TÍTULO -->
          <input 
            type="text"
            id="inc-title"
            placeholder="Título de la incidencia"
          >

          <!-- MENSAJE -->
          <textarea 
            id="inc-message"
            placeholder="Describe el problema..."
            rows="5"
          ></textarea>

          <!-- USUARIO -->
          <input 
            type="text"
            id="inc-cliente"
            placeholder="Usuario"
          >

          <!-- PRIORIDAD -->
          <select id="inc-priority">
            <option value="low">Prioridad baja</option>
            <option value="medium">Prioridad media</option>
            <option value="high">Prioridad alta</option>
          </select>

          <!-- BOTÓN -->
          <div class="form-actions">
            <button id="btn-save-incidencia">
              Crear incidencia
            </button>
          </div>

        </div>

      </div>

    </div>

  </div>

</div>
