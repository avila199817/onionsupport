<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<title>Panel · Onion Support</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#ffffff">

<link rel="icon" type="image/png" href="/media/img/favicon_black_circle.png">

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<!-- CSP (segura pero compatible) -->
<meta http-equiv="Content-Security-Policy" 
content="
default-src 'self';
connect-src 'self' https://api.onionit.net;
img-src 'self' data: https://onionassets.blob.core.windows.net;
script-src 'self' 'unsafe-inline';
style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
font-src 'self' https://fonts.gstatic.com;
">

<!-- CSS -->
<link rel="preload" href="/css/acceso/admin/core.css" as="style" onload="this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="/css/acceso/admin/core.css"></noscript>

<style>
html, body {
  margin: 0;
  padding: 0;
}

body.loading {
  overflow: hidden;
}

#app-loader {
  position: fixed;
  inset: 0;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999999;
  transition: opacity .35s ease, visibility .35s ease;
}

.loader-logo {
  width: 64px;
  height: 64px;
  animation: pulse 1.2s ease-in-out infinite;
}

@keyframes pulse {
  0%   { opacity: 0.4; transform: scale(.92); }
  50%  { opacity: 1;   transform: scale(1); }
  100% { opacity: 0.4; transform: scale(.92); }
}

#app-loader.hide {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
</style>

</head>

<body class="loading">

<!-- NO JS FALLBACK -->
<noscript>
  <p style="padding:20px">Esta aplicación requiere JavaScript para funcionar.</p>
</noscript>

<!-- LOADER -->
<div id="app-loader">
  <img draggable="false" src="/media/img/favicon_black_circle.png" class="loader-logo" alt="Cargando">
</div>

<div class="layout">

<!-- SIDEBAR -->
<aside class="sidebar">

  <div class="sidebar-top">
    <a href="/" data-link class="logo">
      <img draggable="false" src="/media/img/favicon_white.png" alt="Logo">
    </a>

    <button class="sidebar-toggle" id="toggleSidebar" aria-label="Toggle sidebar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="4" width="18" height="16" rx="3"
        stroke="currentColor" stroke-width="1.6"/>
        <path d="M9 4v16"
        stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <nav class="sidebar-menu">

    <a href="/incidencias" data-link class="menu-item">
      <span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.8"/>
          <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h0A1.7 1.7 0 0 0 10 3.1V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5h0a1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v0a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"
          stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span>Incidencias</span>
    </a>

    <a href="/facturas" data-link class="menu-item">
      <span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M6 2h9l5 5v15H6z"
          stroke="currentColor" stroke-width="1.6"/>
          <path d="M14 2v6h6"
          stroke="currentColor" stroke-width="1.6"/>
        </svg>
      </span>
      <span>Facturas</span>
    </a>

    <!-- resto igual que el tuyo (sin tocar SVG) -->

  </nav>

  <div class="sidebar-footer">
    <div class="user" id="userToggle">

      <div class="avatar" id="sidebar-avatar" aria-label="Avatar usuario">ON</div>

      <div class="user-info">
        <span class="name" id="sidebar-name">Usuario</span>
        <span class="plan">Go Plan</span>
      </div>

      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M9 6l6 6-6 6"
        stroke="currentColor" stroke-width="1.6"/>
      </svg>

    </div>

    <div class="user-dropdown" id="userDropdown">
      <!-- dropdown intacto -->
      <div class="dropdown-item" id="logoutBtn">Cerrar sesión</div>
    </div>
  </div>

</aside>

<!-- MAIN -->
<main class="main-content" role="main">

<header class="topbar">
  <div class="topbar-left">
    <h1 class="topbar-title" id="topbar-title">Panel</h1>
  </div>

  <div class="topbar-right">
    <div class="topbar-search-wrap">

      <svg class="topbar-search-icon" viewBox="0 0 24 24" fill="none">
        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
        <path d="M20 20l-3-3" stroke="currentColor" stroke-width="2"/>
      </svg>

      <input 
        type="text"
        id="topbar-search"
        class="topbar-search"
        placeholder="Buscar..."
        autocomplete="off"
      >

      <div id="topbar-search-results" class="topbar-search-results"></div>

    </div>
  </div>
</header>

<!-- 🔥 SPA ROOT -->
<div id="app-content"></div>

</main>

</div>

<!-- CORE JS -->
<script src="/js/acceso/admin/core.js" defer></script>

</body>
</html>
