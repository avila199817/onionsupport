<div class="panel-content incidencias">

  <div class="container">

    <!-- HEADER VACÍO -->
    <div class="dashboard-header"></div>

    <!-- =========================
         GRID PRINCIPAL
    ========================= -->
    <div class="dashboard-grid">

      <div class="panel-block table-block">

        <div class="section-title">Listado de incidencias</div>

        <!-- FILTROS -->
        <div class="filters-row" style="margin-bottom:16px;">

          <input 
            type="text"
            id="search-incidencia"
            placeholder="Buscar incidencia..."
            autocomplete="off"
          >

          <select id="filter-status">
            <option value="">Estado</option>
            <option value="abierta">Abierta</option>
            <option value="progreso">En progreso</option>
            <option value="cerrada">Cerrada</option>
          </select>

          <select id="filter-priority">
            <option value="">Prioridad</option>
            <option value="alta">Alta</option>
            <option value="media">Media</option>
            <option value="baja">Baja</option>
          </select>

        </div>

        <!-- TABLA -->
        <div class="table-container">

          <table class="incidencias-table">

            <thead>
              <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Cliente</th>
                <th>Estado</th>
                <th>Prioridad</th>
                <th>Fecha</th>
                <th>Acciones</th>
              </tr>
            </thead>

            <tbody id="incidencias-body">
              <tr class="table-loading">
                <td colspan="7">Cargando incidencias...</td>
              </tr>
            </tbody>

          </table>

        </div>

      </div>

    </div>

  </div>

</div>
