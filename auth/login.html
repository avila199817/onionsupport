<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Acceso · Onion Support</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🚫 NO INDEXAR -->
<meta name="robots" content="noindex, nofollow">

<!-- Canonical -->
<link rel="canonical" href="https://onionsupport.com/es/acceso/">

<!-- Favicon -->
<link rel="icon"
type="image/png"
href="https://onionassets.z43.web.core.windows.net/media/img/favicon_support.png">

<!-- CSS -->
<link rel="stylesheet" href="/css/nav/acceso.css">
<link rel="stylesheet" href="/css/acceso/password/password.css">

</head>

<body>

<a href="/" class="back-arrow" aria-label="Volver al inicio"></a>

<div class="login-wrapper">

<img
src="/media/img/Laptop_Access.png"
alt="Laptop Access"
class="login-laptop">

<div class="login-card" id="loginCard">

<div class="login-header">

<div class="logo-fade" aria-hidden="true">
<img src="/media/img/favicon_black.png" alt="">
<img src="/media/img/favicon_black_circle.png" alt="">
<img src="/media/img/favicon_support.png" alt="">
<img src="/media/img/favicon_white.png" alt="">
</div>

<h2>Iniciar sesión con la cuenta Onion Support</h2>

</div>

<form id="loginForm" novalidate>

<!-- ERROR LOGIN -->

<div
class="login-error"
id="loginError"
role="alert"
aria-live="polite">
</div>

<!-- USER -->

<div class="login-field">

<input
type="text"
id="username"
name="username"
class="input-text"
placeholder="Usuario o email"
autocomplete="username"
required>

</div>

<!-- PASSWORD -->

<div class="login-field password-wrapper">

<input
type="password"
id="password"
name="password"
class="input-text"
placeholder="Contraseña"
autocomplete="current-password"
required>

<!-- TOGGLE PASSWORD -->

<button
type="button"
class="password-toggle"
id="togglePassword"
aria-label="Mostrar contraseña"
aria-pressed="false">

<svg
id="eyeIcon"
viewBox="0 0 24 24"
width="20"
height="20"
aria-hidden="true">

<path
fill="currentColor"
d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7Zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8Z"/>

</svg>

</button>

<!-- CAPS LOCK ICON -->

<svg
id="capsIcon"
class="caps-icon"
viewBox="0 0 24 24"
width="18"
height="18"
aria-hidden="true">

<path
fill="currentColor"
d="M12 3l6 6h-4v6h-4V9H6l6-6zM6 19h12v2H6z"/>

</svg>

</div>

<!-- SUBMIT -->

<button
type="submit"
class="login-button"
id="loginButton">

Acceder

</button>

<div class="login-reset">

<a href="/es/acceso/reset/">
¿Has olvidado tu contraseña?
</a>

</div>

</form>

<div class="login-footer">
© 2026 Onion Support
</div>

</div>
</div>

<!-- JS -->

<script src="/js/nav/acceso.js" defer></script>

</body>
</html>
