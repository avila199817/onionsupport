<!DOCTYPE html>
<html lang="es">

<head>

  <!-- =========================
       META BASE
  ========================= -->
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>Onion Support</title>

  <!-- =========================
       SECURITY (CSP)
  ========================= -->
  <meta http-equiv="Content-Security-Policy"
    content="
      default-src 'self';
      connect-src 'self' https://api.onionit.net https://onionassets.blob.core.windows.net;
      img-src 'self' data: https://onionassets.blob.core.windows.net;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      script-src 'self' 'unsafe-inline';
    ">

  <!-- =========================
       BASE (SPA)
  ========================= -->
  <base href="/">

  <!-- =========================
       SEO
  ========================= -->
  <meta name="robots" content="noindex, nofollow">

  <!-- =========================
       UI / THEME
  ========================= -->
  <meta name="color-scheme" content="dark light">
  <meta name="theme-color" content="#0d0d0d">

  <!-- =========================
       ICON
  ========================= -->
  <link rel="icon" href="/favicon.ico">

  <!-- =========================
       PERFORMANCE
  ========================= -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- =========================
       FONTS
  ========================= -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- =========================
       CSS ORDER (CRÍTICO)
  ========================= -->

  <!-- TOKENS -->
  <link rel="stylesheet" href="/css/tokens/variables.css">
  <link rel="stylesheet" href="/css/tokens/light.css">

  <!-- RESET -->
  <link rel="stylesheet" href="/css/core/reset.css">

  <!-- CORE -->
  <link rel="stylesheet" href="/css/core/layout.css">
  <link rel="stylesheet" href="/css/core/core.css">

  <!-- LAYOUT -->
  <link rel="stylesheet" href="/css/layout/sidebar.css">
  <link rel="stylesheet" href="/css/layout/topbar.css">

  <!-- COMPONENTS -->
  <link rel="stylesheet" href="/css/components/ui.css">

  <!-- LOADER (ÚLTIMO) -->
  <link rel="stylesheet" href="/css/core/loader.css">

  <!-- =========================
       NOSCRIPT
  ========================= -->
  <noscript>
    <style>
      #app-loader{display:none}
      .layout{visibility:visible !important}
    </style>

    <div style="padding:20px; font-family:sans-serif;">
      ⚠️ Esta aplicación requiere JavaScript para funcionar.
    </div>
  </noscript>

</head>

















































  
<body class="loading" data-app="onion">









  
<!-- LOADER -->
<div id="app-loader" aria-hidden="true">
  <div class="loader-center">
    <img class="loader-logo loader-dark" src="/media/img/favicon_white.png">
    <img class="loader-logo loader-light" src="/media/img/favicon_black.png">
  </div>
</div>











  

<!-- 🔥 LAYOUT COMPLETO -->
<div class="layout">

<aside class="sidebar">

  <!-- TOP -->
  <div class="sidebar-top">
    
    <!-- LOGO -->
    <a href="/" data-spa class="logo" id="homeLink">
      <img class="logo-dark" draggable="false" src="/media/img/favicon_white.png">
      <img class="logo-light" draggable="false" src="/media/img/favicon_black.png">
    </a>

    <!-- BOTÓN CERRAR -->
    <button class="sidebar-toggle" id="toggleSidebar" data-tooltip="Cerrar barra lateral">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="4" width="18" height="16" rx="3"
        stroke="currentColor" stroke-width="1.6"/>
        <path d="M9 4v16"
        stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </button>

  </div>

      </span>
      <span data-i18n="Incidencias">Incidencias</span>

        </svg>
      </span>
      <span data-i18n="Usuarios">Usuarios</span>
    </a>

  </nav>

  <!-- RECIENTES -->
  <div class="sidebar-section">
    <span class="section-title">Recientes</span>

    <a href="/incidencias" data-spa class="chat-item">Incidencia servidor</a>
    <a href="/incidencias" data-spa class="chat-item">Error cliente factura</a>
    <a href="/incidencias" data-spa class="chat-item">Login usuarios</a>
    <a href="/incidencias" data-spa class="chat-item">Backup DB</a>
  </div>

  <!-- USER -->
  <div class="sidebar-footer">
   <div class="user" id="userToggle" role="button" tabindex="0">

      <div class="avatar" id="sidebar-avatar" aria-label="Avatar usuario">ON</div>

      <div class="user-info">
        <span class="name" id="sidebar-name">Usuario</span>

      </div>

      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M9 6l6 6-6 6"
        stroke="currentColor" stroke-width="1.6"/>
      </svg>

    </div>

















    
<!-- DROPDOWN -->

  <div class="dropdown-item">

  </div>

  <div class="dropdown-item">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M4 12h16" stroke="currentColor" stroke-width="1.6"/>

    </svg>

  </div>

    <div class="dropdown-divider"></div>

    <div class="dropdown-item">

  </div>

  </div>

</aside>












<main id="app-view" class="main-content" role="main">










  

  
<header class="topbar">

  <div class="topbar-left">
    <h1 class="topbar-title" id="topbar-title">Panel</h1>
  </div>

  <div class="topbar-right">

    <!-- SEARCH -->
    <div class="topbar-search-wrap">

      <svg class="topbar-search-icon" viewBox="0 0 24 24" fill="none">
        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
        <path d="M20 20l-3-3" stroke="currentColor" stroke-width="2"/>
      </svg>

      <input 
        type="text"
        id="topbar-search"
        class="topbar-search"
        placeholder="Buscar..."
        autocomplete="off"
      >

      <div id="topbar-search-results" class="topbar-search-results" hidden></div>

    </div>

  </div>

</header>









  

  
<div id="app-content" data-view></div>

  
</main>




</div>
