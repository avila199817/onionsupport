<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">


<meta http-equiv="X-UA-Compatible" content="IE=edge">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<meta http-equiv="Content-Security-Policy" 
content="
default-src 'self';
connect-src 'self' https://api.onionit.net;
img-src 'self' data: https://onionassets.blob.core.windows.net;

script-src 'self' 'unsafe-inline';

style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;

<title>Panel · Onion Support</title>

<link rel="icon" type="image/png" href="/media/img/favicon_black_circle.png">

<style>

/* GLOBAL LOADER */

html, body {
  margin: 0;
  padding: 0;
}

body.loading {
  overflow: hidden;
}

#app-loader {
  position: fixed;
  inset: 0;
  background: #ffffff;

  display: flex;
  align-items: center;
  justify-content: center;

  z-index: 999999;

  transition: opacity .35s ease, visibility .35s ease;
}

.loader-logo {
  width: 64px;
  height: 64px;
  animation: pulse 1.2s ease-in-out infinite;
}

@keyframes pulse {
  0%   { opacity: 0.4; transform: scale(.92); }
  50%  { opacity: 1;   transform: scale(1); }
  100% { opacity: 0.4; transform: scale(.92); }
}

#app-loader.hide {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

</style>

<link rel="preload" href="/css/acceso/admin/core.css" as="style">
<link rel="stylesheet" href="/css/acceso/admin/core.css">

</head>

<body class="loading">

<!-- LOADER -->
<div id="app-loader">
  <img draggable="false" src="/media/img/Favicon/favicon_black.ico" class="loader-logo">
</div>


<!-- 🔥 LAYOUT COMPLETO -->
<div class="layout">

<aside class="sidebar">

  <!-- TOP -->
