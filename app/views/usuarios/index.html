<div class="panel-content usuarios">

  <div class="container">

    <div class="panel-block">

      <!-- =========================
           FILTROS
      ========================= -->
      <div class="filters-row">

        <input 
          type="text"
          id="search-usuario"
          placeholder="Buscar usuario..."
          autocomplete="off"
        >

        <select id="filter-estado-usuario">
          <option value="">Estado</option>
          <option value="activo">Activo</option>
          <option value="inactivo">Inactivo</option>
        </select>

        <!-- CTA -->
        <button id="btn-new-usuario">
          + Nuevo
        </button>

      </div>

      <!-- =========================
           TABLA
      ========================= -->
      <div class="table-container">

        <table>

          <thead>
            <tr>
              <th>ID</th>
              <th>Usuario</th>
              <th>Email</th>
              <th>Rol</th>
              <th>Estado</th>
              <th>Fecha</th>
              <th>Acciones</th>
            </tr>
          </thead>

          <tbody id="usuarios-body">
            <tr class="loading">
              <td colspan="7">Cargando usuarios...</td>
            </tr>
          </tbody>

        </table>

      </div>

    </div>

  </div>

</div>
