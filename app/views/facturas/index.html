<div class="panel-content facturas table-mode has-mini-topbar">

  <!-- 🔥 TABLE SYSTEM (IGUAL QUE INCIDENCIAS) -->
  <div class="table-system facturas">

    <!-- 🔥 MINI TOPBAR (ACTÚA COMO filters-row + thead) -->
    <div class="mini-topbar">

      <!-- FILTROS -->
      <div class="mini-topbar-inner">

        <div class="mini-topbar-left">
          <input
            type="text"
            id="search-factura"
            placeholder="Buscar factura..."
            autocomplete="off"
          >
        </div>

        <div class="mini-topbar-right">
          <select id="filter-estado-factura">
            <option value="">Estado pago</option>
            <option value="pagada">Pagada</option>
            <option value="pendiente">Pendiente</option>
          </select>

          <button id="btn-new-factura" class="btn-primary">
            + Nueva
          </button>
        </div>

      </div>

      <!-- HEADER TABLA -->
      <div class="mini-topbar-table">
        <table>
          <thead>
            <tr>
              <th class="col-id">ID</th>
              <th class="col-main">Cliente</th>
              <th class="col-secondary">Empresa</th>
              <th class="col-date">Fecha</th>
              <th class="col-importe">Importe</th>
              <th class="col-status">Pago</th>
              <th class="col-actions">Acciones</th>
            </tr>
          </thead>
        </table>
      </div>

    </div>


    <!-- 🔥 TABLA REAL -->
    <div class="table-container">

      <table>
        
        <thead style="display:none;">
          <tr>
            <th></th>
          </tr>
        </thead>

        <tbody id="facturas-body">

          <tr class="table-loading">
            <td colspan="7">
              <div class="table-loader">
                <div class="spinner"></div>
                <span>Cargando facturas...</span>
              </div>
            </td>
          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>
