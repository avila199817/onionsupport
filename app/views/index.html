<div class="panel-content dashboard">

  <!-- =========================
       HEADER
  ========================= -->
  <div class="dashboard-header">
    <h1>Dashboard</h1>
    <p>Resumen general del sistema</p>
  </div>

  <!-- =========================
       KPIs
  ========================= -->
  <div class="kpi-grid">

    <div class="kpi-card">
      <span>Incidencias</span>
      <strong id="home-incidencias">0</strong>
    </div>

    <div class="kpi-card">
      <span>Clientes</span>
      <strong id="home-clientes">0</strong>
    </div>

    <div class="kpi-card">
      <span>Usuarios</span>
      <strong id="home-usuarios">0</strong>
    </div>

    <div class="kpi-card">
      <span>Facturación</span>
      <strong id="home-facturas">€0</strong>
    </div>

  </div>

  <!-- =========================
       SUMMARY HOY
  ========================= -->
  <div class="summary">

    <div class="summary-item">
      <span>Tickets hoy</span>
      <strong class="summary-value">0</strong>
    </div>

    <div class="summary-item">
      <span>Resueltos</span>
      <strong class="summary-value">0</strong>
    </div>

    <div class="summary-item">
      <span>Pendientes</span>
      <strong class="summary-value">0</strong>
    </div>

  </div>

  <!-- =========================
       MAIN GRID
  ========================= -->
  <div class="dashboard-grid">

    <!-- ACTIVITY -->
    <div class="card">
      <div class="card-header">
        <h3>Actividad reciente</h3>
      </div>

      <div id="activity-list" class="activity-list">
        <div>Cargando...</div>
      </div>
    </div>

    <!-- SYSTEM -->
    <div class="card">
      <div class="card-header">
        <h3>Estado del sistema</h3>
      </div>

      <div class="system-status">

        <div id="status-api">API --</div>
        <div id="status-db">DB --</div>
        <div id="status-uptime">Uptime --</div>

        <hr>

        <div id="cpu-usage">CPU: --</div>
        <div id="ram-usage">RAM: --</div>
        <div id="disk-usage">Disco: --</div>

        <div id="system-warning" style="display:none; color:#c00; margin-top:10px;">
          ⚠️ Alta carga del sistema
        </div>

      </div>
    </div>

  </div>

</div>
