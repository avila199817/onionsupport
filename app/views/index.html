<div class="panel-content dashboard command-center">

  <!-- 🔥 LOADER -->
  <div class="dashboard-loading">
    <div class="dashboard-spinner"></div>
  </div>

  <div class="cc-container">

    <!-- =========================
         HEADER CONTROL
    ========================= -->
    <div class="cc-header">

      <div class="cc-title">
        <h1>Command Center</h1>
        <span>Sistema en tiempo real</span>
      </div>

      <div class="cc-status-live">
        <span class="dot"></span>
        EN VIVO
      </div>

    </div>

    <!-- =========================
         GRID PRINCIPAL
    ========================= -->
    <div class="cc-grid">

      <!-- 🟥 LEFT CONTROL -->
      <div class="cc-side cc-left">

        <div class="cc-block stat">
          <span>Usuarios</span>
          <strong id="home-usuarios">0</strong>
        </div>

        <div class="cc-block stat">
          <span>Clientes</span>
          <strong id="home-clientes">0</strong>
        </div>

        <div class="cc-block stat">
          <span>Tickets</span>
          <strong id="tickets-hoy">0</strong>
        </div>

      </div>

      <!-- 🟦 CENTER CORE -->
      <div class="cc-core">

        <div class="cc-core-main">

          <div class="cc-kpi big">
            <span>Facturación hoy</span>
            <strong id="home-facturacion-mes">€0</strong>
          </div>

          <div class="cc-kpi-row">

            <div class="cc-kpi">
              <span>API</span>
              <strong id="status-api">-- ms</strong>
            </div>

            <div class="cc-kpi">
              <span>Base de datos</span>
              <strong id="status-db">--</strong>
            </div>

            <div class="cc-kpi">
              <span>Uptime</span>
              <strong id="status-uptime">--</strong>
            </div>

          </div>

        </div>

        <!-- ALERTAS -->
        <div class="cc-alerts">

          <div id="cpu-usage" class="cc-alert">CPU --%</div>
          <div id="ram-usage" class="cc-alert">RAM --%</div>
          <div id="disk-usage" class="cc-alert">Disco --%</div>

          <div id="system-warning" class="cc-alert danger" style="display:none;">
            ⚠️ Alta carga del sistema
          </div>

        </div>

      </div>

      <!-- 🟩 RIGHT ACTION -->
      <div class="cc-side cc-right">

        <button class="cc-action">+ Usuario</button>
        <button class="cc-action">+ Cliente</button>
        <button class="cc-action">+ Factura</button>
        <button class="cc-action">+ Ticket</button>

      </div>

    </div>

    <!-- =========================
         ACTIVITY STREAM
    ========================= -->
    <div class="cc-activity">

      <div class="cc-activity-header">
        Actividad en tiempo real
      </div>

      <div id="activity-list" class="cc-activity-stream">

        <div class="cc-activity-item">
          <div class="cc-activity-title">Cargando actividad...</div>
          <div class="cc-activity-meta">Esperando datos</div>
        </div>

      </div>

    </div>

  </div>

</div>
