<div class="panel-content incidencias">

  <div class="container">

    <!-- HEADER VACÍO -->
    <div class="dashboard-header"></div>

    <!-- =========================
         GRID PRINCIPAL
    ========================= -->
    <div class="dashboard-grid">

      <div class="panel-block table-block">

        <!-- =========================
             FILTROS
        ========================= -->
        <div class="filters-row">

          <input 
            type="text"
            id="search-incidencia"
            placeholder="Buscar incidencia..."
            autocomplete="off"
          >

          <select id="filter-status">
            <option value="">Estado</option>
            <option value="abierta">Abierta</option>
            <option value="progreso">En progreso</option>
            <option value="cerrada">Cerrada</option>
          </select>

          <select id="filter-priority">
            <option value="">Prioridad</option>
            <option value="alta">Alta</option>
            <option value="media">Media</option>
            <option value="baja">Baja</option>
          </select>

          <!-- NUEVA CARD / BOTÓN -->
          <button class="btn-new-incidencia">
            + Nuevo
          </button>

        </div>

        <!-- =========================
             TABLA
        ========================= -->
        <div class="table-container">

          <table>

            <thead>
              <tr>
                <th>ID<div class="resizer"></div></th>
                <th>Asunto<div class="resizer"></div></th>
                <th>Cliente<div class="resizer"></div></th>
                <th>Estado<div class="resizer"></div></th>
                <th>Prioridad<div class="resizer"></div></th>
                <th>Fecha<div class="resizer"></div></th>
              </tr>
            </thead>

            <tbody id="incidencias-body">
              <tr class="loading">
                <td colspan="6">Cargando incidencias...</td>
              </tr>
            </tbody>

          </table>

        </div>

      </div>

    </div>

  </div>

</div>
