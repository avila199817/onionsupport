<div class="panel-content usuario-detalle">

  <!-- 🔥 LOADER REAL (MISMO SISTEMA QUE FACTURAS) -->
  <div id="usuario-loading" class="table-loader">
    <div class="spinner"></div>
    <span>Cargando usuario...</span>
  </div>

  <!-- 🔥 CONTENIDO -->
  <div id="usuario-content" style="display:none;">

    <div class="view-layout">

      <!-- =========================
           MAIN
      ========================= -->
      <div class="view-main">

        <!-- HEADER -->
        <div class="view-header">

          <div class="view-user">
            <div id="detalle-avatar" class="view-avatar"></div>

            <div class="view-user-info">
              <div class="view-title" id="detalle-nombre">--</div>

              <div class="view-sub">
                <span id="detalle-id"></span>
              </div>
            </div>
          </div>

          <button id="btn-back" class="view-back">
            ← Volver
          </button>

        </div>

        <!-- BODY -->
        <div class="view-body">

          <div class="view-grid">

            <div class="view-card">
              <div class="view-label">Nombre</div>
              <div class="view-value" id="detalle-nombre-full">--</div>
            </div>

            <div class="view-card">
              <div class="view-label">Email</div>
              <div class="view-value" id="detalle-email">--</div>
            </div>

            <div class="view-card">
              <div class="view-label">Rol</div>
              <div class="view-value" id="detalle-rol">--</div>
            </div>

            <div class="view-card">
              <div class="view-label">Tipo</div>
              <div class="view-value" id="detalle-tipo">--</div>
            </div>

            <div class="view-card">
              <div class="view-label">Estado</div>
              <div class="view-value" id="detalle-estado">--</div>
            </div>

            <div class="view-card">
              <div class="view-label">Fecha alta</div>
              <div class="view-value" id="detalle-fecha">--</div>
            </div>

            <div class="view-card full">
              <div class="view-label">Notas</div>
              <div class="view-value" id="detalle-notas">--</div>
            </div>

          </div>

        </div>

      </div>

      <!-- =========================
           SIDEBAR
      ========================= -->
      <aside class="view-aside">

        <div class="view-sidebar">

          <div class="view-section">
            <div class="view-section-title">Acciones</div>

            <div class="view-files">

              <div class="view-file">
                <span>Editar usuario</span>

                <div class="view-file-actions">
                  <button id="btn-edit-user" class="view-btn soft">Editar</button>
                </div>
              </div>

              <div class="view-file">
                <span>Estado</span>

                <div class="view-file-actions">
                  <button id="btn-toggle-user" class="view-btn primary">
                    Activar / Desactivar
                  </button>
                </div>
              </div>

            </div>
          </div>

          <div class="sidebar-divider"></div>

          <div class="view-section">
            <div class="view-section-title">Actividad reciente</div>
            <div id="detalle-historial" class="view-files">
              Sin actividad
            </div>
          </div>

        </div>

      </aside>

    </div>

  </div>

</div>
