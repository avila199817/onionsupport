<div class="panel-content facturas">

  <div class="container">

    <!-- HEADER -->
    <div class="dashboard-header">
      <div class="header-left">
        <h1 class="page-title">Facturas</h1>
        <p class="page-subtitle">
          Gestión y control de facturación
        </p>
      </div>

      <div class="header-actions">
        <button class="btn primary" id="crear-factura">
          + Nueva factura
        </button>
      </div>
    </div>


    <!-- KPI -->
    <div class="grid-cards">

      <div class="card">
        <span class="card-title">Total facturado</span>
        <span class="card-value" id="facturas-total">-- €</span>
      </div>

      <div class="card">
        <span class="card-title">Pendientes</span>
        <span class="card-value" id="facturas-pendientes">--</span>
      </div>

      <div class="card">
        <span class="card-title">Pagadas</span>
        <span class="card-value" id="facturas-pagadas">--</span>
      </div>

    </div>


    <!-- GRID PRINCIPAL -->
    <div class="dashboard-grid">

      <!-- TABLA -->
      <div class="panel-block">

        <div class="block-header minimal">
          <h2 class="section-title">Listado de facturas</h2>
        </div>

        <div class="table-container">

          <table class="facturas-table">

            <thead>
              <tr>
                <th>ID</th>
                <th>Cliente</th>
                <th>Fecha</th>
                <th>Importe</th>
                <th>Estado</th>
              </tr>
            </thead>

            <tbody id="facturas-body">
              <tr class="table-loading">
                <td colspan="5">Cargando facturas...</td>
              </tr>
            </tbody>

          </table>

        </div>

      </div>

    </div>

  </div>

</div>
